<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI POD Strategy & Slogan Generator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel (to compile JSX in the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .animate-fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [prompt, setPrompt] = useState("");
            const [platform, setPlatform] = useState("");
            const [audience, setAudience] = useState("");
            const [style, setStyle] = useState("");
            const [strategy, setStrategy] = useState(null);
            const [loading, setLoading] = useState(false);
            const [loadingText, setLoadingText] = useState("GENERATE");
            const [showOptions, setShowOptions] = useState(false);

            useEffect(() => {
                let interval;
                if (loading) {
                    const phrases = ["Analyzing niche...", "Evaluating demand...", "Writing slogans...", "Building Amazon listing..."];
                    let idx = 0;
                    setLoadingText(phrases[0]);
                    interval = setInterval(() => {
                        idx = (idx + 1) % phrases.length;
                        setLoadingText(phrases[idx]);
                    }, 2500);
                } else {
                    setLoadingText("GENERATE");
                }
                return () => clearInterval(interval);
            }, [loading]);

            const handleGenerate = async () => {
                if (!prompt.trim()) return;

                setLoading(true);
                setStrategy(null);

                try {
                    const response = await fetch("/api/generate", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ prompt, platform, audience, style }),
                    });

                    const data = await response.json();

                    if (data.success) {
                        setStrategy(data.data);
                    } else {
                        console.error("Error:", data.error);
                        alert("Failed to generate: " + data.error);
                    }
                } catch (error) {
                    console.error(error);
                    alert("Something went wrong. Check console.");
                }

                setLoading(false);
            };

            return (
                <div className="flex h-screen overflow-hidden bg-gray-50">
                    {/* Sidebar */}
                    <aside className="w-64 bg-gray-900 border-r border-gray-800 flex flex-col hidden md:flex">
                        <div className="p-6 border-b border-gray-800">
                            <h2 className="text-xl font-black text-white tracking-tight flex items-center gap-2">
                                <span className="bg-blue-600 text-white w-8 h-8 rounded-lg flex items-center justify-center text-xs font-mono">AI</span>
                                Design Director
                            </h2>
                        </div>

                        <div className="p-4 flex-1">
                            <p className="text-gray-500 text-xs font-bold uppercase tracking-wider mb-4 px-2">Workflow Tools</p>

                            <button
                                onClick={() => {
                                    if (!strategy) {
                                        alert("Please generate a strategy first.");
                                        return;
                                    }
                                    const r = strategy;
                                    const rows = [];
                                    const headers = [
                                        "niche", "slogan", "status", "niche_score", "title", "brand_name",
                                        "bullet_point_1", "bullet_point_2", "description", "blacklist_flag",
                                        "tmhunt_flag", "safe", "prompt", "research_demand", "research_competition",
                                        "viral_potential", "trend_score"
                                    ];
                                    rows.push(headers.join(","));

                                    const csvSafe = (text) => {
                                        if (!text) return "";
                                        return `"${String(text).replace(/"/g, '""')}"`;
                                    };

                                    r.shirtSlogans.forEach(slogan => {
                                        const row = [
                                            csvSafe(r.niche),
                                            csvSafe(slogan),
                                            "NEW",
                                            r.nicheScore?.overall || "",
                                            csvSafe(r.amazonListing?.title || ""),
                                            csvSafe(r.amazonListing?.brandName || ""),
                                            csvSafe(r.amazonListing?.bulletPoint1 || ""),
                                            csvSafe(r.amazonListing?.bulletPoint2 || ""),
                                            csvSafe(r.amazonListing?.description || ""),
                                            "",
                                            "",
                                            "TRUE",
                                            csvSafe(prompt),
                                            r.nicheScore?.demand || "",
                                            r.nicheScore?.competition || "",
                                            r.nicheScore?.emotionalPower || "",
                                            r.nicheScore?.platformFit || ""
                                        ];
                                        rows.push(row.join(","));
                                    });

                                    const csvContent = rows.join("\n");
                                    const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
                                    const url = URL.createObjectURL(blob);
                                    const link = document.createElement("a");
                                    link.href = url;
                                    link.download = "pod_research.csv";
                                    link.click();
                                    URL.revokeObjectURL(url);
                                }}
                                disabled={!strategy}
                                className={`w-full py-3 px-4 rounded-xl font-bold flex items-center gap-3 transition-all text-sm
                                    ${strategy
                                        ? "bg-emerald-600 hover:bg-emerald-500 text-white shadow-lg shadow-emerald-900/20"
                                        : "bg-gray-800 text-gray-600 cursor-not-allowed border border-gray-700"}
                                `}
                            >
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                {strategy ? "Export CSV Data" : "Waiting for Data..."}
                            </button>
                        </div>

                        <div className="p-4 border-t border-gray-800 text-xs text-gray-500 font-medium text-center">
                            POD Strategy Engine v2.0
                        </div>
                    </aside>

                    {/* Main Content Area */}
                    <main className="flex-1 flex flex-col overflow-hidden relative">
                        {/* Topbar */}
                        <header className="bg-white border-b border-gray-200 px-8 py-4 flex items-center justify-between sticky top-0 z-10 shadow-sm">
                            <div>
                                <h1 className="text-xl font-black text-gray-900 tracking-tight">Design Generator Dashboard</h1>
                                <p className="text-xs text-gray-500 font-medium mt-0.5">Transform ideas into high-converting pod listings</p>
                            </div>
                        </header>

                        {/* Scrollable Area */}
                        <div className="flex-1 overflow-y-auto p-4 md:p-8">
                            <div className="max-w-4xl mx-auto space-y-6">

                                {/* Input Panel */}
                                <div className="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm">
                                    <div className="space-y-4">
                                        <div className="flex flex-col md:flex-row gap-3">
                                            <div className="relative flex-1">
                                                <input
                                                    type="text"
                                                    placeholder="Describe a shirt idea (audience + theme + vibe)..."
                                                    value={prompt}
                                                    onChange={(e) => setPrompt(e.target.value)}
                                                    className="w-full border border-gray-300 p-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-lg font-medium shadow-inner transition-all bg-gray-50"
                                                />
                                                <p className="text-xs text-gray-400 mt-2 ml-1">Examples: Funny cat mom sarcasm shirt, Christian faith minimalist, Retro gym motivation</p>
                                            </div>
                                            <button
                                                onClick={handleGenerate}
                                                disabled={loading || !prompt.trim()}
                                                className="bg-blue-600 hover:bg-blue-700 text-white font-black py-4 px-8 rounded-xl disabled:bg-blue-300 transition-all shadow-md transform hover:-translate-y-0.5 whitespace-nowrap min-w-[200px]"
                                            >
                                                {loadingText}
                                            </button>
                                        </div>

                                        {/* Preset Chips */}
                                        <div className="flex flex-wrap gap-2 pt-2">
                                            <span className="text-xs font-bold text-gray-400 self-center mr-1">🔥 Trending:</span>
                                            {["Dog moms", "Nurses", "Gym humor", "Christian faith", "Fishing dads", "Tech workers"].map((preset, i) => (
                                                <button
                                                    key={i}
                                                    onClick={() => setPrompt(preset)}
                                                    className="text-xs bg-gray-100 hover:bg-blue-50 text-gray-600 hover:text-blue-600 font-bold py-1.5 px-3 rounded-full transition-colors border border-gray-200 hover:border-blue-200"
                                                >
                                                    {preset}
                                                </button>
                                            ))}
                                        </div>

                                        <button
                                            onClick={() => setShowOptions(!showOptions)}
                                            className="text-xs font-bold text-gray-500 hover:text-blue-600 flex items-center transition-all"
                                        >
                                            <svg className={`w-4 h-4 mr-1 transform transition-transform ${showOptions ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
                                            {showOptions ? "Hide Advanced Options" : "Show Advanced Options"}
                                        </button>

                                        {showOptions && (
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-3 pt-3 border-t border-gray-100 animate-fade-in">
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Platform Focus</label>
                                                    <select
                                                        value={platform}
                                                        onChange={(e) => setPlatform(e.target.value)}
                                                        className="w-full bg-gray-50 border border-gray-200 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium"
                                                    >
                                                        <option value="">Platform Auto-Detect</option>
                                                        <option value="Amazon Merch">Amazon Merch on Demand</option>
                                                        <option value="Etsy">Etsy Marketplace</option>
                                                        <option value="Redbubble">Redbubble</option>
                                                        <option value="Printful/Shopify">Shopify Direct</option>
                                                    </select>
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Audience Targeting</label>
                                                    <input
                                                        type="text"
                                                        placeholder="e.g. Grandma, Techies"
                                                        value={audience}
                                                        onChange={(e) => setAudience(e.target.value)}
                                                        className="w-full bg-gray-50 border border-gray-200 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium"
                                                    />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Design Style</label>
                                                    <input
                                                        type="text"
                                                        placeholder="e.g. Minimal, Witty"
                                                        value={style}
                                                        onChange={(e) => setStyle(e.target.value)}
                                                        className="w-full bg-gray-50 border border-gray-200 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium"
                                                    />
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {strategy && (
                                    <div className="mt-12 space-y-10 animate-fade-in">
                                        {/* Score Badges */}
                                        <div className="flex flex-wrap gap-2 mb-2">
                                            {strategy.nicheScore?.demand > 75 ? (
                                                <span className="text-xs font-bold bg-green-50 text-green-700 px-3 py-1.5 rounded-full border border-green-200 shadow-sm">🟢 High Demand</span>
                                            ) : (
                                                <span className="text-xs font-bold bg-gray-50 text-gray-700 px-3 py-1.5 rounded-full border border-gray-200 shadow-sm">⚪ Average Demand</span>
                                            )}
                                            {strategy.competitionLevel?.toLowerCase().includes('low') || strategy.nicheScore?.competition < 50 ? (
                                                <span className="text-xs font-bold bg-green-50 text-green-700 px-3 py-1.5 rounded-full border border-green-200 shadow-sm">🟢 Low Competition</span>
                                            ) : strategy.nicheScore?.competition > 75 || strategy.competitionLevel?.toLowerCase().includes('high') ? (
                                                <span className="text-xs font-bold bg-red-50 text-red-700 px-3 py-1.5 rounded-full border border-red-200 shadow-sm">🔴 High Competition</span>
                                            ) : (
                                                <span className="text-xs font-bold bg-yellow-50 text-yellow-700 px-3 py-1.5 rounded-full border border-yellow-200 shadow-sm">🟡 Medium Comp</span>
                                            )}
                                            {strategy.nicheScore?.overall > 80 && (
                                                <span className="text-xs font-bold bg-orange-50 text-orange-700 px-3 py-1.5 rounded-full border border-orange-200 shadow-sm">🔥 Viral Potential {strategy.nicheScore.overall}%</span>
                                            )}
                                        </div>

                                        {/* Insights Header & Score */}
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                            <div className="md:col-span-1 bg-gradient-to-br from-blue-600 to-indigo-700 p-6 rounded-2xl shadow-lg relative overflow-hidden flex flex-col justify-center items-center text-white border border-blue-500">
                                                <div className="absolute -right-10 -top-10 w-40 h-40 bg-white opacity-5 rounded-full blur-2xl"></div>
                                                <h3 className="uppercase text-[10px] tracking-[0.2em] mb-2 font-bold opacity-80">Overall Niche Score</h3>
                                                <div className="text-6xl font-black tracking-tighter drop-shadow-md">
                                                    {strategy.nicheScore ? strategy.nicheScore.overall : "N/A"}
                                                </div>
                                                <p className="text-xs mt-2 opacity-80 font-medium">/100</p>
                                            </div>

                                            <div className="md:col-span-2 grid grid-cols-2 gap-4">
                                                <div className="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex flex-col justify-center">
                                                    <h3 className="text-gray-400 font-bold uppercase text-[9px] tracking-[0.2em] mb-1">Target Niche</h3>
                                                    <p className="text-lg font-black text-gray-900 leading-tight line-clamp-2">{strategy.niche}</p>
                                                </div>
                                                <div className="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex flex-col justify-center">
                                                    <h3 className="text-gray-400 font-bold uppercase text-[9px] tracking-[0.2em] mb-1">Competition</h3>
                                                    <p className="text-lg font-black text-gray-900 leading-tight">{strategy.competitionLevel}</p>
                                                </div>
                                                {strategy.nicheScore && (
                                                    <div className="col-span-2 bg-gray-50 p-4 rounded-xl border border-gray-100 mt-2">
                                                        <div className="grid grid-cols-5 gap-2 text-center text-xs mb-3">
                                                            <div><span className="block font-black text-gray-800 text-lg">{strategy.nicheScore.demand}</span><span className="text-gray-500 text-[9px] uppercase">Demand</span></div>
                                                            <div><span className="block font-black text-gray-800 text-lg">{strategy.nicheScore.competition}</span><span className="text-gray-500 text-[9px] uppercase">Comp</span></div>
                                                            <div><span className="block font-black text-gray-800 text-lg">{strategy.nicheScore.emotionalPower}</span><span className="text-gray-500 text-[9px] uppercase">Emotion</span></div>
                                                            <div><span className="block font-black text-gray-800 text-lg">{strategy.nicheScore.designSimplicity}</span><span className="text-gray-500 text-[9px] uppercase">Design</span></div>
                                                            <div><span className="block font-black text-gray-800 text-lg">{strategy.nicheScore.platformFit}</span><span className="text-gray-500 text-[9px] uppercase">Platform</span></div>
                                                        </div>
                                                        <p className="text-xs text-gray-600 bg-white p-3 rounded-lg border border-gray-200 italic leading-relaxed">
                                                            <span className="font-bold text-gray-800 mr-1">AI Verdict:</span> {strategy.nicheScore.reasoning}
                                                        </p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        {/* Why It Sells & Trigger */}
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                            <div className="md:col-span-2 space-y-2">
                                                <h3 className="text-gray-900 font-black text-lg flex items-center">
                                                    <span className="bg-gray-900 text-white w-6 h-6 rounded-lg flex items-center justify-center text-[10px] mr-3 font-mono">01</span>
                                                    Strategic Reason
                                                </h3>
                                                <p className="text-gray-600 bg-white p-5 rounded-2xl border border-gray-100 leading-relaxed font-medium">
                                                    {strategy.whyItSells}
                                                </p>
                                            </div>
                                            <div className="space-y-2">
                                                <h3 className="text-gray-900 font-black text-lg flex items-center">
                                                    <span className="bg-gray-900 text-white w-6 h-6 rounded-lg flex items-center justify-center text-[10px] mr-3 font-mono">02</span>
                                                    Trigger
                                                </h3>
                                                <div className="bg-orange-50 p-5 rounded-2xl border border-orange-100 flex items-center justify-center min-h-[100px] text-center">
                                                    <p className="text-orange-900 font-black text-lg">{strategy.emotionalTrigger}</p>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Target & Design */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-10 bg-gray-50/50 p-8 rounded-3xl border border-gray-100">
                                            <div>
                                                <h3 className="text-gray-900 font-black text-lg mb-4">Target Audiences</h3>
                                                <div className="flex flex-wrap gap-2">
                                                    {strategy.targetAudiences.map((aud, i) => (
                                                        <span key={i} className="bg-white border border-gray-200 px-4 py-2 rounded-xl text-xs font-bold text-gray-700 shadow-sm">
                                                            {aud}
                                                        </span>
                                                    ))}
                                                </div>
                                            </div>
                                            <div>
                                                <div className="flex justify-between items-center mb-4">
                                                    <h3 className="text-gray-900 font-black text-lg">Design Logic</h3>
                                                    <button
                                                        onClick={() => {
                                                            const text = strategy.designDirections.join('\n');
                                                            navigator.clipboard.writeText(text);
                                                            alert("Design Logic copied!");
                                                        }}
                                                        className="bg-white hover:bg-gray-100 text-gray-700 text-[10px] font-bold py-1.5 px-2.5 rounded border border-gray-200 shadow-sm flex items-center gap-1 transition-colors uppercase"
                                                    >
                                                        <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                                                        Copy
                                                    </button>
                                                </div>
                                                <ul className="space-y-2">
                                                    {strategy.designDirections.map((dir, i) => (
                                                        <li key={i} className="flex items-start text-xs font-medium text-gray-500">
                                                            <span className="text-blue-500 mr-2">✦</span> {dir}
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        </div>

                                        {/* SEO Section */}
                                        {strategy.seoKeywords && strategy.seoKeywords.primary && (
                                            <div className="space-y-6 bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                                                <h3 className="text-gray-900 font-black text-xl flex items-center">
                                                    <span className="bg-blue-600 text-white w-8 h-8 rounded-xl flex items-center justify-center text-xs mr-3 font-mono">#</span>
                                                    Optimized SEO Strategy
                                                </h3>

                                                <div className="space-y-4">
                                                    <div>
                                                        <h4 className="text-sm font-bold text-gray-700 uppercase tracking-wider mb-2">Primary Keyword</h4>
                                                        <div className="bg-blue-50 text-blue-800 py-2 px-4 rounded-lg font-mono font-bold text-lg inline-block border border-blue-200 shadow-inner">
                                                            {strategy.seoKeywords.primary}
                                                        </div>
                                                    </div>

                                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                        <div>
                                                            <h4 className="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Long-tail</h4>
                                                            <ul className="space-y-1">
                                                                {strategy.seoKeywords.longTail && strategy.seoKeywords.longTail.map((kw, i) => (
                                                                    <li key={i} className="text-sm text-gray-600 font-medium bg-gray-50 px-2 py-1 rounded border border-gray-100">{kw}</li>
                                                                ))}
                                                            </ul>
                                                        </div>
                                                        <div>
                                                            <h4 className="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Buyer Intent</h4>
                                                            <ul className="space-y-1">
                                                                {strategy.seoKeywords.buyerIntent && strategy.seoKeywords.buyerIntent.map((kw, i) => (
                                                                    <li key={i} className="text-sm text-gray-600 font-medium bg-gray-50 px-2 py-1 rounded border border-gray-100">{kw}</li>
                                                                ))}
                                                            </ul>
                                                        </div>
                                                        <div>
                                                            <h4 className="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Platform Tags</h4>
                                                            <ul className="space-y-1">
                                                                {strategy.seoKeywords.platformTags && strategy.seoKeywords.platformTags.map((kw, i) => (
                                                                    <li key={i} className="text-sm text-gray-600 font-medium bg-gray-50 px-2 py-1 rounded border border-gray-100">#{kw}</li>
                                                                ))}
                                                            </ul>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {/* Design Studio Section */}
                                        {strategy.imagePrompts && (
                                            <div className="space-y-6 pt-6 border-t border-gray-100">
                                                <div className="flex items-center justify-between">
                                                    <h3 className="text-gray-900 font-black text-2xl flex items-center">
                                                        <span className="bg-indigo-600 text-white w-8 h-8 rounded-xl flex items-center justify-center text-xs mr-3 font-mono">D</span>
                                                        AI Design Studio
                                                    </h3>
                                                    <div className="flex gap-2">
                                                        {strategy.artStyles && strategy.artStyles.map((style, i) => (
                                                            <span key={i} className="text-[10px] font-bold bg-indigo-50 text-indigo-700 px-2 py-1 rounded-md border border-indigo-100 uppercase tracking-tighter">
                                                                {style}
                                                            </span>
                                                        ))}
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-1 gap-4">
                                                    {strategy.imagePrompts.map((promptText, idx) => (
                                                        <div key={idx} className="bg-gray-900 rounded-2xl p-6 relative group overflow-hidden border border-gray-800">
                                                            <div className="absolute right-4 top-4 opacity-0 group-hover:opacity-100 transition-opacity">
                                                                <button
                                                                    onClick={() => {
                                                                        navigator.clipboard.writeText(promptText);
                                                                        alert("Prompt copied to clipboard!");
                                                                    }}
                                                                    className="bg-white/10 hover:bg-white/20 text-white text-[10px] font-bold py-2 px-3 rounded-lg backdrop-blur-md border border-white/10 flex items-center gap-2"
                                                                >
                                                                    <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                                                                    COPY PROMPT
                                                                </button>
                                                            </div>
                                                            <h4 className="text-indigo-400 font-black text-[10px] uppercase tracking-[0.2em] mb-3">Image Prompt {idx + 1}</h4>
                                                            <p className="text-gray-300 font-mono text-sm leading-relaxed pr-20">{promptText}</p>
                                                            <div className="mt-4 flex gap-4">
                                                                <div className="flex items-center gap-1 text-[10px] font-bold text-gray-500 uppercase">
                                                                    <span className="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> Transparent
                                                                </div>
                                                                <div className="flex items-center gap-1 text-[10px] font-bold text-gray-500 uppercase">
                                                                    <span className="w-1.5 h-1.5 rounded-full bg-blue-500"></span> 300 DPI
                                                                </div>
                                                                <div className="flex items-center gap-1 text-[10px] font-bold text-gray-500 uppercase">
                                                                    <span className="w-1.5 h-1.5 rounded-full bg-indigo-500"></span> Vector Style
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {/* Amazon Listing Section */}
                                        {strategy.amazonListing && (
                                            <div className="space-y-6 pt-6 border-t border-gray-100">
                                                <div className="flex items-center justify-between mb-2">
                                                    <h3 className="text-gray-900 font-black text-2xl flex items-center">
                                                        <span className="bg-orange-500 text-white w-8 h-8 rounded-xl flex items-center justify-center text-xs mr-3 font-mono">A</span>
                                                        Amazon POD Listing
                                                    </h3>
                                                    <button
                                                        onClick={() => {
                                                            const text = `Title:\n${strategy.amazonListing.title}\n\nBullet 1:\n${strategy.amazonListing.bulletPoint1}\n\nBullet 2:\n${strategy.amazonListing.bulletPoint2}\n\nDescription:\n${strategy.amazonListing.description}\n\nKeywords:\n${strategy.amazonListing.keywords.join(', ')}`;
                                                            navigator.clipboard.writeText(text);
                                                            alert("Full listing copied!");
                                                        }}
                                                        className="bg-yellow-400 hover:bg-yellow-500 text-yellow-900 text-xs font-black py-2 px-4 rounded-lg shadow-sm flex items-center gap-2 transition-colors uppercase tracking-wider"
                                                    >
                                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                                                        ⭐ Copy Full Listing
                                                    </button>
                                                </div>

                                                <div className="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                                                    <div className="p-6 border-b border-gray-100 bg-gray-50/50">
                                                        <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Product Title</label>
                                                        <p className="text-lg font-bold text-gray-900 leading-snug">{strategy.amazonListing.title}</p>
                                                    </div>

                                                    <div className="grid grid-cols-1 md:grid-cols-2">
                                                        <div className="p-6 border-b md:border-b-0 md:border-r border-gray-100 space-y-4">
                                                            <div>
                                                                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Brand Name</label>
                                                                <p className="text-sm font-semibold text-blue-700 bg-blue-50 inline-block px-3 py-1 rounded-md">{strategy.amazonListing.brandName}</p>
                                                            </div>
                                                            <div>
                                                                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Bullet Point 1</label>
                                                                <p className="text-sm text-gray-700 leading-relaxed">{strategy.amazonListing.bulletPoint1}</p>
                                                            </div>
                                                            <div>
                                                                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Bullet Point 2</label>
                                                                <p className="text-sm text-gray-700 leading-relaxed">{strategy.amazonListing.bulletPoint2}</p>
                                                            </div>
                                                        </div>

                                                        <div className="p-6 space-y-4 bg-gray-50/30">
                                                            <div>
                                                                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Product Description</label>
                                                                <p className="text-sm text-gray-600 leading-relaxed italic">{strategy.amazonListing.description}</p>
                                                            </div>
                                                            <div>
                                                                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Backend Search Terms</label>
                                                                <div className="flex flex-wrap gap-1.5">
                                                                    {strategy.amazonListing.keywords && strategy.amazonListing.keywords.map((kw, i) => (
                                                                        <span key={i} className="text-[10px] font-bold bg-white text-gray-600 px-2 py-1 rounded border border-gray-200">
                                                                            {kw}
                                                                        </span>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {/* Slogans Section */}
                                        <div className="space-y-6 pt-6 border-t border-gray-100">
                                            <div className="flex items-center justify-between mb-2">
                                                <h3 className="text-gray-900 font-black text-2xl flex items-center">
                                                    <span className="bg-blue-600 text-white w-8 h-8 rounded-xl flex items-center justify-center text-xs mr-3 font-mono">S</span>
                                                    10 Catchy Shirt Slogans
                                                </h3>
                                                <button
                                                    onClick={() => {
                                                        const text = strategy.shirtSlogans.join('\n');
                                                        navigator.clipboard.writeText(text);
                                                        alert("All slogans copied!");
                                                    }}
                                                    className="bg-blue-50 hover:bg-blue-100 text-blue-700 text-xs font-bold py-2 px-3 rounded-md border border-blue-200 flex items-center gap-1.5 transition-colors uppercase"
                                                >
                                                    <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                                                    Copy All
                                                </button>
                                            </div>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                {strategy.shirtSlogans.map((slogan, idx) => (
                                                    <div key={idx} className="bg-white border border-gray-100 p-5 rounded-xl shadow-sm hover:shadow-md hover:border-blue-200 transition-all cursor-pointer group relative overflow-hidden flex items-center">
                                                        <div className="absolute left-0 top-0 h-full w-1.5 bg-blue-600 transform -translate-x-full group-hover:translate-x-0 transition-transform"></div>
                                                        <p className="text-gray-900 font-black text-sm italic tracking-tight leading-snug">"{slogan}"</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
