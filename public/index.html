<!DOCTYPE html>
<html lang="en">

<head>

        content="TrendForge AI — Turn trends into revenue. Discover profitable niches, generate designs, and automate publishing with AI.">

    </script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <script src="https://unpkg.com/framer-motion@10.12.16/dist/framer-motion.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .animate-fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }

        .analytics-card {
            background: #111;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #222;
        }

        .analytics-card.highlight {
            border: 1px solid #4f46e5;
        }

        .analytics-title {
            color: white;
            font-weight: 800;
            font-size: 14px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .analytics-stat {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 4px;
        }

        .analytics-substat {
            font-size: 12px;
            color: #9ca3af;
            font-weight: 600;
        }

        .analytics-list div {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #333;
            color: #d1d5db;
            font-size: 13px;
            font-weight: 500;
        }

        .analytics-list div:last-child {
            border-bottom: none;
        }

        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }

        .heat-tile {
            padding: 14px;
            border-radius: 10px;
            color: white;
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s ease;
        }

        .heat-tile:hover {
            transform: translateY(-4px);
        }

        .heat-score {
            font-size: 28px;
            font-weight: 900;
        }

        .heat-decision {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.9;
        }

        .queue-card {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: white;
            padding: 16px;
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .queue-card:hover {
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            border-color: #22c55e;
        }

        .run-card {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px;
            background: white;
            cursor: pointer;
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .run-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.07);
            border-color: #6366f1;
        }

        .run-bar-bg {
            background: #f3f4f6;
            border-radius: 999px;
            height: 6px;
            flex: 1;
        }

        .run-bar-fill {
            border-radius: 999px;
            height: 6px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            transition: width 0.5s ease;
        }

        .revenue-box {
            background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
            border: 1px solid #bbf7d0;
            border-radius: 12px;
            padding: 14px 16px;
        }

        .revenue-box.medium {
            background: linear-gradient(135deg, #fffbeb 0%, #fef9c3 100%);
            border-color: #fde68a;
        }

        .revenue-box.low {
            background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
            border-color: #e5e7eb;
        }

        .usage-panel {
            background: #0f172a;
            border-radius: 12px;
            padding: 14px;
            margin-top: auto;
            border: 1px solid #1e293b;
        }

        .credit-bar {
            height: 8px;
            background: #1e293b;
            border-radius: 6px;
            overflow: hidden;
            margin: 8px 0;
        }

        .credit-line {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #22c55e);
            transition: width 0.3s ease;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ─── Local Dev Auto-Login Mock ──────────────────────────────────────
        // Injects standard Enterprise Session Tokens into the prototype UI without needing a login page.
        const originalFetch = window.fetch;
        window.fetch = async function () {
            let args = Array.prototype.slice.call(arguments);
            let url = args[0];
            let options = args[1] || {};

            let token = localStorage.getItem('saas_token');

            async function bootstrapToken() {
                try {
                    const res = await originalFetch('/api/auth/demo', { method: 'POST' });
                    const data = await res.json();
                    if (data.success && data.token) {
                        localStorage.setItem('saas_token', data.token);
                        return data.token;
                    }
                } catch (e) {
                    console.error("Failed to bootstrap auth", e);
                }
                return null;
            }

            // If we don't have a token, and we're not asking for one, bootstrap the session
            if (!token && !url.includes('/api/auth/demo')) {
                token = await bootstrapToken();
            }

            // Inject the Bearer token for middleware compliance
            if (token && !url.includes('/api/auth/demo')) {
                options.headers = options.headers || {};
                options.headers['Authorization'] = `Bearer ${token}`;
                args[1] = options;
            }

            let response = await originalFetch.apply(this, args);

            // Silent Token Renewal on 401 Unauthorized
            if (response.status === 401 && !url.includes('/api/auth/demo')) {
                console.warn("[AUTH] 401 Received. Attempting token renewal...");
                token = await bootstrapToken();
                if (token) {
                    options.headers['Authorization'] = `Bearer ${token}`;
                    args[1] = options;
                    response = await originalFetch.apply(this, args); // Retry once
                }
            }

            return response;
        };

        // ─── Revenue Projection Engine ─────────────────────────────────────
        const ROYALTY_PER_SALE = 5.50;  // Amazon POD royalty
        const BASE_MONTHLY_SALES = 30;  // baseline for an average niche

        function getConfidence(score) {
            if (score >= 75) return 'High';
            if (score >= 55) return 'Medium';
            return 'Low';
        }

        function estimateSales(product) {
            const demandFactor = (product.searchVolume || 50) / 100;
            const compPenalty = 1 - (product.competitionDensity || 50) / 100;
            const trendBoost = ((product.trend?.score || product.trendMomentum || 50) / 100);
            const intentBoost = (product.buyerIntent || 50) / 100;

            const raw = BASE_MONTHLY_SALES *
                demandFactor *
                compPenalty *
                (1 + trendBoost) *
                (1 + intentBoost);

            return Math.max(1, Math.round(raw));
        }

        function projectRevenue(product) {
            const sales = estimateSales(product);
            return {
                monthlySales: sales,
                monthlyRevenue: parseFloat((sales * ROYALTY_PER_SALE).toFixed(2)),
                confidence: getConfidence(product.niche_score || 0)
            };
        }

        function portfolioRevenue(products) {
            return (products || []).reduce((sum, p) => {
                const proj = p.projection || projectRevenue(p);
                return sum + proj.monthlyRevenue;
            }, 0);
        }

        // ─── RevenueBox Component ────────────────────────────────────────
        function RevenueBox({ product }) {
            const proj = product.projection || projectRevenue(product);
            const confClass = proj.confidence === 'High' ? '' :
                proj.confidence === 'Medium' ? 'medium' : 'low';
            const confColor = proj.confidence === 'High' ? 'text-emerald-700' :
                proj.confidence === 'Medium' ? 'text-yellow-700' : 'text-gray-500';
            return (
                <div className={`revenue-box ${confClass} mt-4`}>
                    <div className="flex items-center justify-between mb-3">
                        <span className="text-[10px] font-black uppercase tracking-widest text-gray-500 flex items-center gap-1">
                            <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Revenue Projection
                        </span>
                        <span className={`text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded ${confColor} ${proj.confidence === 'High' ? 'bg-emerald-100' : proj.confidence === 'Medium' ? 'bg-yellow-100' : 'bg-gray-100'}`}>
                            {proj.confidence} Confidence
                        </span>
                    </div>
                    <div className="grid grid-cols-3 gap-2 text-center">
                        <div className="bg-white/70 rounded-lg p-2">
                            <div className="text-lg font-black text-gray-800">{proj.monthlySales}</div>
                            <div className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Est. Sales/mo</div>
                        </div>
                        <div className="bg-white/70 rounded-lg p-2">
                            <div className="text-lg font-black text-gray-800">${proj.monthlyRevenue.toFixed(2)}</div>
                            <div className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Profit/mo</div>
                        </div>
                        <div className="bg-white/70 rounded-lg p-2">
                            <div className="text-lg font-black text-gray-800">${(proj.monthlyRevenue * 12).toFixed(0)}</div>
                            <div className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Annual Est.</div>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── Client-side Compliance Helpers ─────────────────────────────────────
        const FRONTEND_TRADEMARK_FLAGS = [
            "disney", "marvel", "star wars", "star trek", "pokemon", "nintendo", "super mario",
            "zelda", "minecraft", "nike", "adidas", "supreme", "gucci", "louis vuitton",
            "prada", "versace", "chanel", "rolex", "yeezy", "coca cola", "pepsi", "starbucks",
            "red bull", "harry potter", "lord of the rings", "game of thrones", "breaking bad",
            "the simpsons", "spongebob", "mickey mouse", "spiderman", "batman", "superman",
            "iron man", "avengers", "frozen", "moana", "hello kitty", "barbie", "transformers",
            "taylor swift", "beyonce", "eminem", "drake", "kanye west", "the beatles"
        ];
        const FRONTEND_POLICY_BLOCK = [
            "logo parody", "brand parody", "celebrity name", "movie quote", "song lyrics",
            "copyrighted character", "guaranteed cure", "medical claim", "hate symbol",
            "hate speech", "racial slur", "explicit sexual"
        ];

        function checkFrontendCompliance(text) {
            const lower = (text || "").toLowerCase();
            const tm = FRONTEND_TRADEMARK_FLAGS.filter(t => lower.includes(t));
            const pol = FRONTEND_POLICY_BLOCK.filter(t => lower.includes(t));
            return { flagged: tm.length > 0 || pol.length > 0, trademarks: tm, policies: pol };
        }

        // ─── ComplianceBadge Component ───────────────────────────────────────────
        function ComplianceBadge({ compliance }) {
            if (!compliance) return null;

            if (compliance.wasRewritten) {
                return (
                    <div className="flex flex-col gap-2 mt-3 p-3 bg-purple-50/50 border border-purple-200 rounded-lg">
                        <div className="flex items-center gap-2">
                            <svg className="w-4 h-4 text-purple-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd"></path></svg>
                            <span className="text-[10px] font-black text-purple-700 uppercase tracking-widest">Rewritten — Safe</span>
                        </div>
                        <div className="text-[10px] font-medium text-purple-600">
                            Original concept generated to ensure marketplace compliance.
                        </div>
                    </div>
                );
            }

            if (compliance.safe) {
                return (
                    <div className="flex items-center gap-2 mt-3 px-3 py-2 bg-emerald-50 border border-emerald-200 rounded-lg">
                        <svg className="w-3.5 h-3.5 text-emerald-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd"></path></svg>
                        <span className="text-[10px] font-black text-emerald-700 uppercase tracking-widest">Compliance Clear — Safe for Publishing</span>
                    </div>
                );
            }
            const isHigh = compliance.riskLevel === 'HIGH';
            return (
                <div className={`mt-3 px-3 py-3 rounded-lg border ${isHigh ? 'bg-red-50 border-red-200' : 'bg-yellow-50 border-yellow-200'}`}>
                    <div className="flex items-center gap-2 mb-2">
                        <svg className={`w-3.5 h-3.5 flex-shrink-0 ${isHigh ? 'text-red-500' : 'text-yellow-500'}`} fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clipRule="evenodd"></path></svg>
                        <span className={`text-[10px] font-black uppercase tracking-widest ${isHigh ? 'text-red-700' : 'text-yellow-700'}`}>
                            {isHigh ? '🚫 High Risk' : '⚠️ Medium Risk'} — Review Before Publishing
                        </span>
                    </div>
                    {compliance.trademarkMatches.length > 0 && (
                        <p className={`text-[10px] font-bold ${isHigh ? 'text-red-600' : 'text-yellow-600'}`}>
                            <span className="uppercase tracking-wider">Trademark:</span> {compliance.trademarkMatches.join(", ")}
                        </p>
                    )}
                    {compliance.policyViolations.length > 0 && (
                        <p className={`text-[10px] font-bold mt-0.5 ${isHigh ? 'text-red-600' : 'text-yellow-600'}`}>
                            <span className="uppercase tracking-wider">Policy:</span> {compliance.policyViolations.join(", ")}
                        </p>
                    )}
                </div>
            );
        }

        // ─── TrendBadge Component ───────────────────────────────────────────────
        function TrendBadge({ trend }) {
            if (!trend) return null;

            const badgeColors = {
                "🔥 Trending": "bg-red-100 text-red-700 border-red-200",
                "📈 Rising": "bg-orange-100 text-orange-700 border-orange-200",
                "⚖ Stable": "bg-gray-100 text-gray-700 border-gray-200",
                "🧊 Cooling": "bg-blue-100 text-blue-700 border-blue-200"
            };

            const velocityColor = trend.signals?.growthAcceleration >= 60 ? "text-red-500" :
                trend.signals?.growthAcceleration <= 40 ? "text-blue-500" : "text-gray-400";
            const velocityIcon = trend.signals?.growthAcceleration >= 60 ? "▲" :
                trend.signals?.growthAcceleration <= 40 ? "▼" : "▬";

            return (
                <div className={`flex items-center justify-between gap-3 mt-3 p-3 rounded-lg border ${badgeColors[trend.badge] || badgeColors["⚖ Stable"]}`}>
                    <div className="flex items-center gap-2">
                        <span className="text-xs">{trend.badge.split(' ')[0]}</span>
                        <span className="text-[10px] font-black uppercase tracking-widest">{trend.badge.split(' ').slice(1).join(' ')}</span>
                        <span className={`text-[10px] font-bold ${velocityColor}`}>{velocityIcon} {trend.signals?.growthAcceleration}% Velocity</span>
                    </div>
                    <div className="text-[9px] font-bold opacity-60 uppercase tracking-tighter">
                        Confidence: {trend.confidence}
                    </div>
                </div>
            );
        }

        // ─── Publish Queue Logic ─────────────────────────────────────────────
        function shouldPublish(product) {
            const trendScore = product.trend?.score || product.trendMomentum || 0;
            return (
                product.niche_score >= 70 &&
                (product.searchVolume || 0) >= 60 &&
                (product.competitionDensity || 100) <= 50 &&
                trendScore >= 50 &&
                product.safe !== false &&
                product.compliance?.safe !== false
            );
        }

        function buildPublishQueue(products) {
            return products
                .filter(shouldPublish)
                .map(p => {
                    const trendScore = p.trend?.score || p.trendMomentum || 0;
                    return {
                        ...p,
                        publish_confidence: Math.round(
                            (p.niche_score * 0.5) + (trendScore * 0.3) + (p.searchVolume * 0.2)
                        )
                    };
                })
                .sort((a, b) => b.publish_confidence - a.publish_confidence);
        }

        function getRiskBadge(p) {
            if (p.competitionDensity >= 70) return { label: 'Saturated', color: 'bg-red-100 text-red-700' };
            const trendScore = p.trend?.score || p.trendMomentum || 0;
            if (trendScore >= 70) return { label: '🔥 Trending', color: 'bg-red-500 text-white' };
            if (trendScore >= 50) return { label: '📈 Emerging', color: 'bg-blue-100 text-blue-700' };
            return { label: 'Evergreen', color: 'bg-green-100 text-green-700' };
        }

        function exportQueueCSV(queue) {
            if (!queue.length) return;
            const csvSafe = (v) => `"${String(v || '').replace(/"/g, '""')}"`;

            const headers = [
                'niche',
                'amazon_title',
                'brand_name',
                'bullet_point_1',
                'bullet_point_2',
                'description',
                'search_keywords',
                'all_10_slogans',
                'primary_design_prompt',
                'secondary_design_prompt',
                'tertiary_design_prompt',
                'design_logic',
                'niche_score',
                'publish_confidence',
                'searchVolume',
                'competitionDensity',
                'trendMomentum',
                'buyerIntent',
                'blacklist_flag',
                'tmhunt_flag',
                'safe'
            ];

            const rows = queue.map(p => {
                const listing = p.amazonListing || {};

                // Format arrays with newlines for CSV readability
                const slogans = p.shirtSlogans ? p.shirtSlogans.join('\n') : (p.slogan || '');
                const keywords = listing.keywords ? listing.keywords.join(', ') : '';
                const dirs = p.designDirections ? p.designDirections.join('\n') : '';

                // Extract individual prompts if available
                const prompt1 = p.imagePrompts && p.imagePrompts[0] ? p.imagePrompts[0] : '';
                const prompt2 = p.imagePrompts && p.imagePrompts[1] ? p.imagePrompts[1] : '';
                const prompt3 = p.imagePrompts && p.imagePrompts[2] ? p.imagePrompts[2] : '';

                return [
                    csvSafe(p.niche),
                    csvSafe(listing.title || p.title),
                    csvSafe(listing.brandName || ''),
                    csvSafe(listing.bulletPoint1 || p.bullet_point_1 || ''),
                    csvSafe(listing.bulletPoint2 || p.bullet_point_2 || ''),
                    csvSafe(listing.description || p.description || ''),
                    csvSafe(keywords),
                    csvSafe(slogans),
                    csvSafe(prompt1),
                    csvSafe(prompt2),
                    csvSafe(prompt3),
                    csvSafe(dirs),
                    p.niche_score || '',
                    p.publish_confidence || '',
                    p.searchVolume || '',
                    p.competitionDensity || '',
                    p.trendMomentum || '',
                    p.buyerIntent || '',
                    csvSafe(p.compliance?.policyViolations?.join(' | ') || ''),
                    csvSafe(p.compliance?.trademarkMatches?.join(' | ') || ''),
                    p.compliance?.safe !== false ? (p.compliance?.wasRewritten ? 'REWRITTEN_SAFE' : 'TRUE') : 'FALSE'
                ].join(',');
            });
            const blob = new Blob([[headers.join(','), ...rows].join('\n')], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'publish_queue.csv'; a.click();
            URL.revokeObjectURL(url);
        }

        // ─── SmartPublishQueue Component ─────────────────────────────────────
        function SmartPublishQueue({ products }) {
            if (!products || products.length === 0) return null;
            const queue = buildPublishQueue(products);
            if (queue.length === 0) return (
                <div className="mb-8 p-5 rounded-2xl border border-dashed border-gray-200 bg-gray-50 text-center text-sm text-gray-400 font-semibold animate-fade-in">
                    No products met the auto-publish threshold this run. Lower the thresholds or re-run to generate higher-scoring niches.
                </div>
            );
            return (
                <section className="mb-10 animate-fade-in">
                    <div className="flex items-center justify-between mb-4">
                        <div>
                            <h3 className="text-xl font-black text-gray-900 flex items-center gap-2">
                                <span className="bg-emerald-100 text-emerald-600 w-8 h-8 flex items-center justify-center rounded-lg shadow-inner">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                                </span>
                                Smart Publish Queue
                            </h3>

        // ─── Run History Helpers ───────────────────────────────────────────
        function averageArr(arr) {
            if (!arr.length) return 0;
            return Math.round(arr.reduce((a, b) => a + b, 0) / arr.length);

        function createRunRecord(products, type) {
            const scores = products.map(p => p.niche_score).filter(Boolean);
            return {
                id: Date.now(),
                date: new Date().toISOString(),
                type: type || 'bulk',
                totalProducts: products.length,
                avgScore: averageArr(scores),
                topScore: scores.length ? Math.max(...scores) : 0,
                publishableCount: products.filter(shouldPublish).length,
                products
            };
        }

            const history = JSON.parse(localStorage.getItem('saas_runs') || '[]');
            history.unshift(record);

        // ─── Pipeline Guards & Logging ───────────────────────────────────────
        function logPipelineEvent(type, payload) {
            console.log(`[PIPELINE] ${new Date().toISOString()} | ${type}:`, payload);

        function normalizeStrategy(raw) {
            if (!raw) return null;
            return {
                ...raw,
                id: raw.id || (typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2)),
                niche: raw.niche || "general commercial niche",
                shirtSlogans: Array.isArray(raw.shirtSlogans) ? raw.shirtSlogans : (raw.slogan ? [raw.slogan] : []),
                targetAudiences: Array.isArray(raw.targetAudiences) ? raw.targetAudiences : (raw.audience ? [raw.audience] : []),
                rewritten: Boolean(raw.rewritten || raw.compliance?.wasRewritten),
                imagePrompt: raw.imagePrompt || null,
                imagePrompts: Array.isArray(raw.imagePrompts) ? raw.imagePrompts : [],
                status: raw.status || "ready",
                createdAt: raw.createdAt || Date.now()
            };
        }

        function getConceptStatus(generatedPrompts, slogan, strategy) {
            const data = generatedPrompts[slogan];
            const status = data?.status || "ready";

            if (data?.loading) return { label: "Processing...", color: "bg-blue-500/10 text-blue-500 border-blue-500/20" };

            // If we have a prompt but it was a fallback, show that
            if (data?.fallback) return { label: "Safe Prompt Used", color: "bg-gray-500/10 text-gray-400 border-gray-500/20" };

            // If it was rewritten by compliance (on initial strategy generation)
            if (strategy?.rewritten || strategy?.compliance?.wasRewritten) {
                return { label: "Rewritten", color: "bg-amber-500/10 text-amber-500 border-amber-500/20" };
            }

            switch (status) {
                case "generated":
                    return { label: "Concept Ready", color: "bg-emerald-500/10 text-emerald-500 border-emerald-500/20" };
                case "failed":
                    return { label: "Failed", color: "bg-red-500/10 text-red-400 border-red-400/20" };
                default:
                    return { label: "Concept Ready", color: "bg-emerald-500/10 text-emerald-500 border-emerald-500/20" };
            }
        }

        function safeGeneratePrompt(strategy, slogan) {
            const text = slogan || "original concept";
            return `
Create an original POD t-shirt design.

Text: "${text}"
Style: clean vector illustration
No brands, logos, or trademarks.
Transparent background.
Commercial friendly.
300 DPI.
`.trim();
        }

        // ─── AI Insight Panel Component ──────────────────────────────────────
        function InsightPanel({ insights }) {
            if (!insights || insights.length === 0) return null;
            const [currentIndex, setCurrentIndex] = useState(0);

            useEffect(() => {
                setCurrentIndex(0); // Reset index when data changes to prevent out-of-bounds crashes
                if (insights.length <= 1) return;
                const timer = setInterval(() => {
                    setCurrentIndex(prev => (prev + 1) % insights.length);
                }, 8000);
                return () => clearInterval(timer);
            }, [insights]);

            const activeInsight = insights[currentIndex];
            if (!activeInsight) return null; // Defensive check

            const colors = {
                info: 'bg-blue-50 border-blue-200 text-blue-800',
                success: 'bg-emerald-50 border-emerald-200 text-emerald-800',
                warning: 'bg-amber-50 border-amber-200 text-amber-800',
                error: 'bg-red-50 border-red-200 text-red-800'
            };

            return (
                <div className={`flex items-center gap-3 px-5 py-4 rounded-xl border animate-fade-in ${colors[activeInsight.severity] || colors.info} mb-6 shadow-sm`}>
                    <div className="text-2xl">{activeInsight.icon || '✨'}</div>
                    <div className="flex-1">
                        <div className="text-[10px] font-black uppercase tracking-widest opacity-60 mb-0.5">AI Strategic Insight ({currentIndex + 1}/{insights.length})</div>
                        <div className="text-sm font-semibold">{activeInsight.message}</div>
                    </div>
                </div>
            );
        }

        function WorkspaceSwitcher() {
            const [workspaces, setWorkspaces] = useState([]);
            const [activeWs, setActiveWs] = useState(null);
            const [switching, setSwitching] = useState(false);
            const [showDropdown, setShowDropdown] = useState(false);

            useEffect(() => {
                fetch('/api/workspace/list')
                    .then(r => r.json())
                    .then(data => {
                        if (data.success && data.workspaces) {
                            setWorkspaces(data.workspaces);
                            setActiveWs(data.workspaces.find(w => w.isActive) || data.workspaces[0]);
                        }
                    })
                    .catch(console.error);
            }, []);

            const switchWorkspace = async (id) => {
                if (id === activeWs?.id) return;
                setSwitching(true);
                setShowDropdown(false);
                try {
                    const res = await fetch('/api/workspace/switch', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ targetWorkspaceId: id })
                    });
                    const data = await res.json();
                    if (data.success) {
                        // Hard reload to flush all dashboard caches and grab new context 
                        window.location.reload();
                    } else {
                        alert(data.error || 'Failed to switch workspace');
                        setSwitching(false);
                    }
                } catch (e) {
                    alert('Error switching workspace');
                    setSwitching(false);
                }
            };

            if (!activeWs) return null;

            return (
                <div className="relative">
                    <button
                        onClick={() => setShowDropdown(!showDropdown)}
                        disabled={switching}
                        className="flex items-center gap-3 bg-gray-50 hover:bg-gray-100 border border-gray-200 px-4 py-2 rounded-xl transition-all"

                    </button>

                    {showDropdown && (
                        <div className="absolute right-0 mt-2 w-64 bg-white border border-gray-200 rounded-xl shadow-xl z-50 overflow-hidden animate-fade-in">
                            <div className="px-4 py-3 bg-gray-50 border-b border-gray-100">
                                <span className="text-[10px] font-black uppercase tracking-widest text-gray-500">Switch Workspace</span>
                            </div>
                            <div className="max-h-64 overflow-y-auto">
                                {workspaces.map(ws => (
                                    <button
                                        key={ws.id}
                                        onClick={() => switchWorkspace(ws.id)}

        function App() {
            const [insights, setInsights] = useState([]);

            const [loading, setLoading] = useState(false);
            const [loadingText, setLoadingText] = useState("GENERATE");

            const [bulkLoading, setBulkLoading] = useState(false);

            const [autopilotData, setAutopilotData] = useState(() => {

            const [autopilotLoading, setAutopilotLoading] = useState(false);

            const [pipelineRunning, setPipelineRunning] = useState(false);

            // Fetch AI Strategic Insights
            useEffect(() => {

            // Monetization States
            const [usageInfo, setUsageInfo] = useState(null);

            const checkUsageError = (responseStatus, data) => {

                    setUpgradeMessage(data.action || "Upgrade your plan to continue.");

            const upgradePlan = async (plan) => {
                try {
                    const res = await fetch("/api/billing/create-checkout-session", {

            const PRESET_STYLES = ["Vintage Distressed", "Hand-Drawn", "Bold Graphic", "Retro Vintage", "Minimalist Vector"];

            const FALLBACK_TRENDS = ["Dog moms", "Nurses", "Gym humor", "Christian faith", "Fishing dads", "Tech workers"];
            const [trendingTopics, setTrendingTopics] = useState(FALLBACK_TRENDS);
            const [trendsLoading, setTrendsLoading] = useState(false);

            // Platform badge meta
            const PLAT_META = {
                amazon: { label: 'Amazon Merch', color: 'bg-orange-500/20 text-orange-400 border-orange-500/30' },
                etsy: { label: 'Etsy POD', color: 'bg-pink-500/20 text-pink-400 border-pink-500/30' },
                redbubble: { label: 'Redbubble', color: 'bg-red-500/20 text-red-400 border-red-500/30' },
                shopify: { label: 'Shopify / Printify', color: 'bg-green-500/20 text-green-400 border-green-500/30' },
            };

            const currentPlatKey = (strategy && (strategy.platform || strategy.detectedPlatform)) || 'amazon';
            const currentPlatMeta = PLAT_META[currentPlatKey] || PLAT_META.amazon;

            // Fetch fresh trends from /api/discover once every 30 mins
            useEffect(() => {
                const CACHE_KEY = 'ai_saas_trends_cache_v2';
                const TTL_MS = 30 * 60 * 1000; // 30 minutes
                try {
                    const cached = localStorage.getItem(CACHE_KEY);
                    if (cached) {
                        const { ts, topics } = JSON.parse(cached);
                        if (Date.now() - ts < TTL_MS && Array.isArray(topics) && topics.length) {
                            setTrendingTopics(topics);
                            return; // still fresh, skip fetch
                        }
                    }
                } catch (e) { }

                setTrendsLoading(true);
                fetch('/api/discover', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' })
                    .then(r => r.json())
                    .then(data => {
                        if (data.success && Array.isArray(data.opportunities) && data.opportunities.length) {
                            // Use the niche name, trimmed and title-cased
                            const topics = data.opportunities
                                .slice(0, 6)
                                .map(o => o.niche || o.targetAudience || '')
                                .filter(Boolean);
                            if (topics.length) {
                                setTrendingTopics(topics);
                                try {
                                    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), topics }));
                                } catch (e) { }
                            }
                        }
                    })
                    .catch(() => { /* silent — fallback list stays */ })
                    .finally(() => setTrendsLoading(false));
            }, []);

            // UX Foundation States
            const [error, setError] = React.useState(null);
            const [generationTime, setGenerationTime] = React.useState(null);

            // Advanced Discovery State
            const [advancedKeywords, setAdvancedKeywords] = React.useState(null);
            const [seedNiche, setSeedNiche] = React.useState("");

            const [startTime, setStartTime] = useState(null);
            const [copiedId, setCopiedId] = useState(null);
            const [generatedPrompts, setGeneratedPrompts] = useState({});
            const [collapsedPrompts, setCollapsedPrompts] = useState({});
            const [analyticsData, setAnalyticsData] = useState(null);

            const chartsRef = React.useRef({ credits: null, feature: null, trend: null });

            const loadAnalytics = async () => {
                try {
                    const res = await fetch("/api/analytics/workspace");
                    const data = await res.json();
                    if (data.success) {
                        setAnalyticsData(data);
                    }
                } catch (e) {
                    console.error("Failed to load analytics", e);
                }
            };

            useEffect(() => {
                let interval;
                if (activeView === 'analytics') {
                    interval = setInterval(() => {
                        loadAnalytics();
                    }, 15000);
                }
                return () => clearInterval(interval);
            }, [activeView]);

            useEffect(() => {
                if (activeView === 'analytics' && analyticsData && window.Chart) {
                    // Update Credits
                    const creditsCanvas = document.getElementById("creditsChart");
                    if (creditsCanvas) {
                        if (chartsRef.current.credits) chartsRef.current.credits.destroy();
                        const ws = analyticsData.workspace;
                        const used = ws.monthlyCredits - ws.creditsRemaining;
                        chartsRef.current.credits = new Chart(creditsCanvas, {
                            type: 'doughnut',
                            data: {
                                labels: ['Used', 'Remaining'],
                                datasets: [{ data: [used, ws.creditsRemaining], backgroundColor: ['#6366f1', '#1f2937'], borderColor: '#111', borderWidth: 2 }]
                            },
                            options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#9ca3af', font: { size: 10 } } } } }
                        });
                    }

                    // Update Feature
                    const featureCanvas = document.getElementById("featureChart");
                    if (featureCanvas) {
                        if (chartsRef.current.feature) chartsRef.current.feature.destroy();
                        const labels = Object.keys(analyticsData.analytics.featureUsage);
                        const values = Object.values(analyticsData.analytics.featureUsage);
                        chartsRef.current.feature = new Chart(featureCanvas, {
                            type: 'bar',
                            data: {
                                labels,
                                datasets: [{ label: 'Uses', data: values, backgroundColor: '#8b5cf6', borderRadius: 4 }]
                            },
                            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#1f2937' }, ticks: { color: '#9ca3af', stepSize: 1 } }, x: { grid: { display: false }, ticks: { color: '#9ca3af' } } } }
                        });
                    }

                    // Update Trend
                    const trendCanvas = document.getElementById("trendChart");
                    if (trendCanvas) {
                        if (chartsRef.current.trend) chartsRef.current.trend.destroy();
                        const daily = {};
                        (analyticsData.analytics.timeline || []).forEach(entry => {
                            const date = new Date(entry.time).toLocaleDateString([], { month: 'short', day: 'numeric' });
                            daily[date] = (daily[date] || 0) + 1;
                        });
                        const tLabels = Object.keys(daily);
                        const tValues = Object.values(daily);
                        chartsRef.current.trend = new Chart(trendCanvas, {
                            type: 'line',
                            data: {
                                labels: tLabels,
                                datasets: [{ label: 'Actions', data: tValues, borderColor: '#10b981', backgroundColor: '#10b98122', fill: true, tension: 0.4 }]
                            },
                            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#1f2937' }, ticks: { color: '#9ca3af', stepSize: 1 } }, x: { grid: { display: false }, ticks: { color: '#9ca3af' } } } }
                        });
                    }
                }
            }, [activeView, analyticsData]);

            const toggleCollapse = (slogan) => {
                setCollapsedPrompts(prev => ({
                    ...prev,
                    [slogan]: !prev[slogan]
                }));
            };

            const generatePromptForSlogan = async (slogan) => {
                if (!slogan || !strategy) return;

                logPipelineEvent("GENERATION_START", { slogan, niche: strategy.niche });
                setGeneratedPrompts(prev => ({ ...prev, [slogan]: { loading: true, status: "processing" } }));

                try {
                    const response = await fetch("/api/generate-prompt", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            slogan,
                            niche: strategy.niche,
                            audience: strategy.targetAudiences?.join(', ') || strategy.targetAudience,
                            style: selectedDesignStyle,
                            platform: strategy?.platform || strategy?.detectedPlatform || platform
                        })
                    });

                    const data = await response.json();

                    if (checkUsageError(response.status, data)) {
                        setGeneratedPrompts(prev => ({ ...prev, [slogan]: { loading: false, status: "failed" } }));
                        return;
                    }

                    if (data.success && data.prompt) {
                        logPipelineEvent("GENERATION_SUCCESS", { slogan });
                        setGeneratedPrompts(prev => ({
                            ...prev,
                            [slogan]: { loading: false, prompt: data.prompt, status: "generated", fallback: false }
                        }));
                    } else if (data.fallback) {
                        logPipelineEvent("GENERATION_FALLBACK", { slogan, error: data.error });
                        const fallbackPrompt = safeGeneratePrompt(strategy, slogan);
                        setGeneratedPrompts(prev => ({
                            ...prev,
                            [slogan]: { loading: false, prompt: fallbackPrompt, status: "generated", fallback: true, error: data.error }
                        }));
                        // We can show a toast here if we had a toast system, for now console and status badge handles it
                    } else {
                        logPipelineEvent("GENERATION_FAILED", { slogan, error: data.error });
                        setGeneratedPrompts(prev => ({ ...prev, [slogan]: { loading: false, error: data.error || "Generation rejected", status: "failed" } }));
                    }
                } catch (err) {
                    logPipelineEvent("GENERATION_EXCEPTION", { slogan, error: err.message });
                    const fallbackPrompt = safeGeneratePrompt(strategy, slogan);
                    setGeneratedPrompts(prev => ({
                        ...prev,
                        [slogan]: { loading: false, prompt: fallbackPrompt, status: "generated", fallback: true, error: err.message }
                    }));
                }
            };

            const handleCopy = (id, text) => {
                navigator.clipboard.writeText(text);
                setCopiedId(id);
                setTimeout(() => setCopiedId(null), 2000);
            };

            // Persist to local storage
            useEffect(() => {
                if (strategy) localStorage.setItem('ai_saas_strategy', JSON.stringify(strategy));
                else localStorage.removeItem('ai_saas_strategy');
            }, [strategy]);

            useEffect(() => {
                if (opportunities) localStorage.setItem('ai_saas_opportunities', JSON.stringify(opportunities));
                else localStorage.removeItem('ai_saas_opportunities');
            }, [opportunities]);

            useEffect(() => {
                if (bulkProducts) localStorage.setItem('ai_saas_bulkProducts', JSON.stringify(bulkProducts));
                else localStorage.removeItem('ai_saas_bulkProducts');
            }, [bulkProducts]);

            useEffect(() => {
                if (autopilotData) localStorage.setItem('ai_saas_autopilot', JSON.stringify(autopilotData));
                else localStorage.removeItem('ai_saas_autopilot');
            }, [autopilotData]);

            useEffect(() => {
                let interval;
                if (loading) {
                    const phrases = ["Step 1: Market analysis...", "Step 2: Evaluating demand...", "Step 3: Concept generation...", "Step 4: Writing listing...", "Step 5: Scoring..."];
                    let idx = 0;
                    setLoadingText(phrases[0]);
                    interval = setInterval(() => {
                        idx = (idx + 1) % phrases.length;
                        setLoadingText(phrases[idx]);
                    }, 2500);
                } else {
                    setLoadingText("GENERATE");
                }
                return () => clearInterval(interval);
            }, [loading]);

            useEffect(() => {
                let interval;
                if (discovering) {
                    const phrases = ["Step 1: Scanning markets...", "Step 2: Finding goldmines...", "Step 3: Analyzing search volumes...", "Step 4: Ranking opportunities..."];
                    let idx = 0;
                    setDiscoveringText(phrases[0]);
                    interval = setInterval(() => {
                        idx = (idx + 1) % phrases.length;
                        setDiscoveringText(phrases[idx]);
                    }, 2500);
                } else {
                    setDiscoveringText("Auto Discover");
                }
                return () => clearInterval(interval);
            }, [discovering]);

            useEffect(() => {
                let interval;
                if (bulkLoading) {
                    const phrases = ["Step 1: Initializing factory...", "Step 2: Scanning niches...", "Step 3: Drafting designs...", "Step 4: Writing Amazon listings...", "Step 5: Scoring products...", "Step 6: Finalizing batch..."];
                    let idx = 0;
                    setBulkLoadingText(phrases[0]);
                    interval = setInterval(() => {
                        idx = (idx + 1) % phrases.length;
                        setBulkLoadingText(phrases[idx]);
                    }, 3000);
                } else {
                    setBulkLoadingText("Bulk Generate Factory");
                }
                return () => clearInterval(interval);
            }, [bulkLoading]);

            useEffect(() => {
                let interval;
                if (autopilotLoading) {
                    const phrases = ["Step 1: Finding opportunities...", "Step 2: Manufacturing products...", "Step 3: Building listings...", "Step 4: Evaluating profitability...", "Step 5: Ranking inventory..."];
                    let idx = 0;
                    setAutopilotLoadingText(phrases[0]);
                    interval = setInterval(() => {
                        idx = (idx + 1) % phrases.length;
                        setAutopilotLoadingText(phrases[idx]);
                    }, 3500);
                } else {
                    setAutopilotLoadingText("Run Autopilot Production");
                }
                return () => clearInterval(interval);
            }, [autopilotLoading]);

            const handleGenerate = async () => {
                if (!prompt.trim()) return;

                setLoading(true);
                setStrategy(null);
                // setOpportunities(null); // Preserve
                // setBulkProducts(null); // Preserve
                setError(null);
                setGeneratedPrompts({});

                // Pre-generation compliance warning (advisory — AI will still run with safety rules)
                const preCheck = checkFrontendCompliance(prompt + ' ' + audience);
                if (preCheck.flagged) {
                    const issueList = [...preCheck.trademarks, ...preCheck.policies].join(', ');
                    setError({
                        type: 'validation',
                        message: `⚠ Potential IP Risk Detected — your prompt references restricted content: "${issueList}". The AI will apply safety rules, but please review the result carefully before publishing.`
                    });
                }

                const start = Date.now();
                setStartTime(start);


                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 25000); // 25s timeout

                try {
                    const response = await fetch("/api/generate", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ prompt, platform, audience, style }),
                        signal: controller.signal
                    });

                    clearTimeout(timeoutId);
                    const data = await response.json();

                    if (checkUsageError(response.status, data)) {
                        setLoading(false);
                        return;
                    }

                    if (data.success) {
                        logPipelineEvent("STRATEGY_GENERATED", { niche: data.data.niche });
                        const stData = normalizeStrategy(data.data);
                        setStrategy(stData);

                        if (stData.imagePrompts?.length && stData.shirtSlogans?.length) {
                            const newP = {};
                            stData.shirtSlogans.forEach((sl, i) => {
                                if (stData.imagePrompts[i]) {
                                    newP[sl] = { loading: false, prompt: stData.imagePrompts[i], status: "generated", fallback: false };
                                }
                            });
                            setGeneratedPrompts(newP);
                        }

                        setGenerationTime(((Date.now() - start) / 1000).toFixed(1));
                    } else {
                        console.error("Error:", data.error);
                        setError({ type: 'validation', message: data.error });
                    }
                } catch (error) {
                    console.error(error);
                    if (error.name === 'AbortError') {
                        setError({ type: 'recoverable', message: 'Generation timed out. The AI took too long to respond. Please try again.' });
                    } else {
                        setError({ type: 'system', message: 'A system error occurred connecting to the generation server.' });
                    }
                }

                setLoading(false);
            };

            const handleDiscover = async () => {
                setDiscovering(true);
                // setStrategy(null); // Preserve
                setOpportunities(null);
                // setBulkProducts(null); // Preserve
                setError(null);
                const start = Date.now();
                setStartTime(start);

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 25000);

                try {
                    const response = await fetch("/api/discover", {
                        method: "POST",
                        signal: controller.signal
                    });

                    clearTimeout(timeoutId);
                    const data = await response.json();

                    if (checkUsageError(response.status, data)) {
                        setDiscovering(false);
                        return;
                    }

                    if (data.success) {
                        setOpportunities(data.opportunities);
                        setGenerationTime(((Date.now() - start) / 1000).toFixed(1));
                    } else {
                        console.error("Error:", data.error);
                        setError({ type: 'validation', message: data.error });
                    }
                } catch (error) {
                    console.error(error);
                    if (error.name === 'AbortError') {
                        setError({ type: 'recoverable', message: 'Discovery timed out. Please try again.' });
                    } else {
                        setError({ type: 'system', message: 'A system error occurred connecting to the discovery server.' });
                    }
                }

                setDiscovering(false);
            };

            const handleAdvancedDiscover = async () => {
                if (!seedNiche) {
                    alert("Please enter a seed niche first.");
                    return;
                }
                setDiscovering(true);
                setAdvancedKeywords(null);
                setOpportunities(null);
                setError(null);
                const start = Date.now();
                setStartTime(start);

                try {
                    const response = await fetch("/api/discover-advanced", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ niche: seedNiche })
                    });

                    const data = await response.json();

                    if (checkUsageError(response.status, data)) {
                        setDiscovering(false);
                        return;
                    }

                    if (data.success) {
                        setAdvancedKeywords(data.topKeywords);
                        setGenerationTime(((Date.now() - start) / 1000).toFixed(1));
                    } else {
                        console.error("Error:", data.error);
                        setError({ type: 'validation', message: data.error });
                    }
                } catch (error) {
                    console.error("Advanced discovery failed:", error);
                    setError({ type: 'system', message: 'Failed to run advanced intelligence.' });
                }

                setDiscovering(false);
            };

            const chunkArray = (arr, size) => {
                const chunks = [];
                for (let i = 0; i < arr.length; i += size) {
                    chunks.push(arr.slice(i, i + size));
                }
                return chunks;
            };

            const handleBulkGenerate = async () => {
                setBulkLoading(true);
                setBulkProducts(null);
                setError(null);
                const start = Date.now();
                setStartTime(start);

                try {
                    // 1. Get Discovered Niches
                    const discRes = await fetch("/api/bulk-generate", { method: "POST" });
                    const discData = await discRes.json();

                    if (checkUsageError(discRes.status, discData)) {
                        setBulkLoading(false);
                        return;
                    }
                    if (!discRes.ok) {
                        throw new Error(`Factory server error: ${discRes.status}`);
                    }
                    if (!discData.success) {
                        console.warn("Factory returned unsuccessful status:", discData.error);
                        // Continue execution using the safe fallback array provided by backend
                    }

                    const niches = discData.niches || [];
                    const chunks = chunkArray(niches, 3); // Process 3 niches per Vercel request
                    let allProducts = [];

                    // 2. Incrementally generate listings in chunks
                    for (const chunk of chunks) {
                        const chunkRes = await fetch("/api/generate-chunk", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ niches: chunk, isAutopilot: false })
                        });
                        const chunkData = await chunkRes.json();
                        if (chunkData.success && chunkData.products) {
                            allProducts = [...allProducts, ...chunkData.products];
                            // Optional: could do partial visual updates here
                        } else {
                            console.error("Chunk failed:", chunkData.error);
                        }
                    }

                    const normalized = allProducts.map(normalizeStrategy);
                    logPipelineEvent("BULK_GENERATED", { count: normalized.length });
                    setBulkProducts(normalized);
                    setGenerationTime(((Date.now() - start) / 1000).toFixed(1));

                    if (normalized.length > 0) {
                        const rec = createRunRecord(normalized, 'bulk');
                        saveRun(rec);
                        setRunHistory(loadRunHistory());
                    }

                } catch (error) {
                    console.error("Factory connection error:", error);
                    setError({ type: 'system', message: 'A system error occurred connecting to the factory server. ' + error.message });
                }

                setBulkLoading(false);
            };

            const handleAutopilot = async () => {
                setAutopilotLoading(true);
                setAutopilotData(null);
                setError(null);
                const start = Date.now();
                setStartTime(start);

                try {
                    // 1. Get Discovered Niches
                    const discRes = await fetch("/api/autopilot", { method: "POST" });
                    const discData = await discRes.json();

                    if (checkUsageError(discRes.status, discData)) {
                        setAutopilotLoading(false);
                        return;
                    }
                    if (!discRes.ok) {
                        throw new Error(`Autopilot server error: ${discRes.status}`);
                    }
                    if (!discData.success) {
                        console.warn("Autopilot returned unsuccessful status:", discData.error);
                        // Continue execution using the safe fallback array provided by backend
                    }

                    const niches = discData.niches || [];
                    const chunks = chunkArray(niches, 3);
                    let allProducts = [];

                    // 2. Incrementally generate listings in chunks
                    for (const chunk of chunks) {
                        const chunkRes = await fetch("/api/generate-chunk", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ niches: chunk, isAutopilot: true })
                        });
                        const chunkData = await chunkRes.json();
                        if (chunkData.success && chunkData.products) {
                            allProducts = [...allProducts, ...chunkData.products];
                        }
                    }

                    if (allProducts.length > 0) {
                        const runSummary = {
                            productsGenerated: allProducts.length,
                            publishCount: allProducts.filter(p => p.decision === 'PUBLISH').length,
                            testCount: allProducts.filter(p => p.decision === 'TEST').length,
                            skipCount: allProducts.filter(p => p.decision === 'SKIP').length,
                            runTimeSeconds: Math.round((Date.now() - start) / 1000)
                        };

                        // Sort by decision
                        allProducts.sort((a, b) => {
                            const decValue = { 'PUBLISH': 3, 'TEST': 2, 'SKIP': 1 };
                            const diff = (decValue[b.decision] || 0) - (decValue[a.decision] || 0);
                            return diff !== 0 ? diff : (b.publishPriority || 0) - (a.publishPriority || 0);
                        });

                        const finalData = { runSummary, products: allProducts };
                        setAutopilotData(finalData);
                        setGenerationTime(((Date.now() - start) / 1000).toFixed(1));
                        const rec = createRunRecord(allProducts, 'autopilot');
                        saveRun(rec);
                        setRunHistory(loadRunHistory());
                    } else {
                        setError({ type: 'validation', message: "Autopilot failed to return valid data." });
                    }

                } catch (error) {
                    console.error("Autopilot connection error:", error);
                    setError({ type: 'system', message: 'A system error occurred connecting to the autopilot server. ' + error.message });
                }

                setAutopilotLoading(false);
            };

            const PIPELINE_STEPS = [
                { step: 1, label: 'Discovering profitable niches…', key: 'discover' },
                { step: 2, label: 'Generating product listings…', key: 'generate' },
                { step: 3, label: 'Scoring opportunity & demand…', key: 'score' },
                { step: 4, label: 'Forecasting revenue potential…', key: 'forecast' },
                { step: 5, label: 'Selecting publish candidates…', key: 'select' },

                setPipelineRunning(true);
                setPipelineStatus({ step: 1, label: PIPELINE_STEPS[0].label, progress: 10 });
                setError(null);
                setAutopilotData(null);
                const start = Date.now();

                    setPipelineStatus({ step: 2, label: PIPELINE_STEPS[1].label, progress: 30 });

                    await stepDelay(600);
                    setPipelineStatus({ step: 3, label: PIPELINE_STEPS[2].label, progress: 55 });

                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 90000);
                    const response = await fetch('/api/autopilot', { method: 'POST', signal: controller.signal });

                    const data = await response.json();

                    if (checkUsageError(response.status, data)) {
                        setPipelineRunning(false);
                        setPipelineStatus(null);
                        return;
                    }

                    setPipelineStatus({ step: 4, label: PIPELINE_STEPS[3].label, progress: 75 });
                    await stepDelay(400);
                    setPipelineStatus({ step: 5, label: PIPELINE_STEPS[4].label, progress: 90 });
                    await stepDelay(400);

                                                                </span>
                                                                {currentPlatMeta.label} Listing
                                                            </h3>
                                                            <button
                                                                onClick={() => {
                                                                    const text = `${strategy.amazonListing.title}\n\n${strategy.amazonListing.brandName}\n\n${strategy.amazonListing.bulletPoint1}\n${strategy.amazonListing.bulletPoint2}\n\n${strategy.amazonListing.description}\n\n${strategy.amazonListing.keywords.join(', ')}`;
                                                                    handleCopy('listing', text);
                                                                }}
                                                                className="bg-yellow-400 hover:bg-yellow-500 text-yellow-900 text-xs font-black py-2 px-4 rounded-lg shadow-sm flex items-center justify-center min-w-[170px] transition-colors uppercase tracking-wider"
                                                            >
                                                                {copiedId === 'listing' ? (
                                                                    <span className="flex items-center gap-2"><svg className="w-4 h-4 text-green-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg> COPIED ✓</span>
                                                                ) : (
                                                                    <span className="flex items-center gap-2"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg> Copy Full Listing</span>
                                                                )}
                                                            </button>
                                                        </div>

                                                        <div className="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                                                            <div className="p-6 border-b border-gray-100 bg-gray-50/50">
                                                                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Product Title</label>
                                                                <p className="text-lg font-bold text-gray-900 leading-snug">{strategy.amazonListing.title}</p>
                                                            </div>

                                                            <div className="grid grid-cols-1 md:grid-cols-2">
                                                                <div className="p-6 border-b md:border-b-0 md:border-r border-gray-100 space-y-4">
                                                                    <div>
                                                                        <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Brand Name</label>
                                                                        <p className="text-sm font-semibold text-blue-700 bg-blue-50 inline-block px-3 py-1 rounded-md">{strategy.amazonListing.brandName}</p>
                                                                    </div>
                                                                    <div>
                                                                        <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Bullet Point 1</label>
                                                                        <p className="text-sm text-gray-700 leading-relaxed">{strategy.amazonListing.bulletPoint1}</p>
                                                                    </div>
                                                                    <div>
                                                                        <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Bullet Point 2</label>
                                                                        <p className="text-sm text-gray-700 leading-relaxed">{strategy.amazonListing.bulletPoint2}</p>
                                                                    </div>
                                                                </div>

                                                                <div className="p-6 space-y-4 bg-gray-50/30">
                                                                    <div>
                                                                        <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Product Description</label>
                                                                        <p className="text-sm text-gray-600 leading-relaxed italic">{strategy.amazonListing.description}</p>
                                                                    </div>
                                                                    <div>
                                                                        <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Backend Search Terms</label>
                                                                        <div className="flex flex-wrap gap-1.5">
                                                                            {strategy.amazonListing.keywords && strategy.amazonListing.keywords.map((kw, i) => (
                                                                                <span key={i} className="text-[10px] font-bold bg-white text-gray-600 px-2 py-1 rounded border border-gray-200">
                                                                                    {kw}
                                                                                </span>
                                                                            ))}
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}


                                            </div>
                                        )}
                                    </div>
                                </div>
                            </main >
                        </div >
                    )}
                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
