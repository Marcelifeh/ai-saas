                                                        className="bg-white hover:bg-gray-100 text-gray-700 text-[10px] font-bold py-1.5 px-2.5 rounded border border-gray-200 shadow-sm flex items-center gap-1 transition-colors uppercase"
                                                    >
                                                        <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                                                        Copy
                                                    </button>
                                                </div>
                                                <ul className="space-y-2">
                                                    {strategy.designDirections.map((dir, i) => (
                                                        <li key={i} className="flex items-start text-xs font-medium text-gray-500">
                                                            <svg className="w-3 h-3 text-blue-500 mt-0.5 mr-2 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                                                            {dir}
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        </div>

                                        {/* SEO Section */}
                                        {strategy.seoKeywords && strategy.seoKeywords.primary && (
                                            <div className="space-y-6 bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                                                <h3 className="text-gray-900 font-black text-xl flex items-center">
                                                    <span className="bg-blue-600 text-white w-8 h-8 rounded-xl flex items-center justify-center text-xs mr-3 font-mono">#</span>
                                                    Optimized SEO Strategy
                                                </h3>

                                                <div className="space-y-4">
                                                    <div>
                                                        <h4 className="text-sm font-bold text-gray-700 uppercase tracking-wider mb-2">Primary Keyword</h4>
                                                        <div className="bg-blue-50 text-blue-800 py-2 px-4 rounded-lg font-mono font-bold text-lg inline-block border border-blue-200 shadow-inner">
                                                            {strategy.seoKeywords.primary}
                                                        </div>
                                                    </div>

                                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                        <div>
                                                            <h4 className="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Long-tail</h4>
                                                            <ul className="space-y-1">
                                                                {strategy.seoKeywords.longTail && strategy.seoKeywords.longTail.map((kw, i) => (
                                                                    <li key={i} className="text-sm text-gray-600 font-medium bg-gray-50 px-2 py-1 rounded border border-gray-100">{kw}</li>
                                                                ))}
                                                            </ul>
                                                        </div>
                                                        <div>
                                                            <h4 className="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Buyer Intent</h4>
                                                            <ul className="space-y-1">
                                                                {strategy.seoKeywords.buyerIntent && strategy.seoKeywords.buyerIntent.map((kw, i) => (
                                                                    <li key={i} className="text-sm text-gray-600 font-medium bg-gray-50 px-2 py-1 rounded border border-gray-100">{kw}</li>
                                                                ))}
                                                            </ul>
                                                        </div>
                                                        <div>
                                                            <h4 className="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Platform Tags</h4>
                                                            <ul className="space-y-1">
                                                                {strategy.seoKeywords.platformTags && strategy.seoKeywords.platformTags.map((kw, i) => (
                                                                    <li key={i} className="text-sm text-gray-600 font-medium bg-gray-50 px-2 py-1 rounded border border-gray-100">#{kw}</li>
                                                                ))}
                                                            </ul>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {/* Design Studio Section */}
                                        {strategy.imagePrompts && (
                                            <div className="space-y-6 pt-6 border-t border-gray-100">
                                                <div className="flex items-center justify-between flex-wrap gap-3">
                                                    <div className="flex items-center gap-3">
                                                        <h3 className="text-gray-900 font-black text-2xl flex items-center">
                                                            <span className="bg-indigo-600 text-white w-8 h-8 rounded-xl flex items-center justify-center text-xs mr-3 font-mono">D</span>
                                                            AI Design Studio
                                                        </h3>
                                                        <span className={`text-[10px] font-black uppercase tracking-widest px-2.5 py-1 rounded-full border ${currentPlatMeta.color}`}>
                                                            &#11045; {currentPlatMeta.label}
                                                        </span>
                                                    </div>
                                                    <div className="flex flex-wrap gap-2">
                                                        {PRESET_STYLES.map((style, i) => (
                                                            <button
                                                                key={i}
                                                                onClick={() => setSelectedDesignStyle(style)}
                                                                className={`text-[10px] font-bold px-3 py-1.5 rounded-md border uppercase tracking-tighter transition-all ${selectedDesignStyle === style ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-indigo-50 text-indigo-700 border-indigo-100 hover:bg-indigo-100'}`}
                                                            >
                                                                {style}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-1 gap-4">
                                                    {strategy.imagePrompts.map((basePromptText, idx) => {
                                                        // Inject the active style into the DESIGN STYLE: line of structured prompts
                                                        const injectStyle = (text, style) => {
                                                            // Match "DESIGN STYLE:" followed by anything up to the next newline
                                                            const styleLineRx = /(DESIGN STYLE:\s*)([^\n]*)/i;
                                                            if (styleLineRx.test(text)) {
                                                                return text.replace(styleLineRx, `$1${style}`);
                                                            }
                                                            // Fallback: style appended for very short / legacy prompts
                                                            return `${text}, ${style} style, transparent background, 300 DPI, vector design`;
                                                        };

                                                        const isStructured = basePromptText.includes('\n') || basePromptText.length > 150;
                                                        const finalPromptText = injectStyle(basePromptText, selectedDesignStyle);

                                                        const wordCount = finalPromptText.trim().split(/\s+/).length;
                                                        const isCopied = copiedId === 'prompt_' + idx;
                                                        const promptLabels = ['Typographic Quote', 'Bold Statement', 'Abstract Symbol'];

                                                        const SECTION_KEYS = ['PLATFORM OPTIMIZATION', 'COLOR STRATEGY', 'COMMERCIAL OPTIMIZATION', 'PLATFORM PRODUCTION REQUIREMENTS'];
                                                        const SECTION_COLORS = {
                                                            'PLATFORM OPTIMIZATION': 'border-orange-400/40 bg-orange-900/10 text-orange-300',
                                                            'COLOR STRATEGY': 'border-indigo-400/40 bg-indigo-900/10 text-indigo-300',
                                                            'COMMERCIAL OPTIMIZATION': 'border-emerald-400/40 bg-emerald-900/10 text-emerald-300',
                                                            'PLATFORM PRODUCTION REQUIREMENTS': 'border-gray-600/40 bg-gray-800/40 text-gray-400',
                                                        };

                                                        let sections = [];
                                                        let remainingText = finalPromptText;
                                                        if (isStructured) {
                                                            for (const key of SECTION_KEYS) {
                                                                const kidx = remainingText.indexOf(key + ':');
                                                                if (kidx !== -1) {
                                                                    const before = remainingText.slice(0, kidx).trim();
                                                                    if (before) sections.push({ label: null, text: before });
                                                                    let after = remainingText.slice(kidx + key.length + 1);
                                                                    let nextIdx = Infinity;
                                                                    for (const k2 of SECTION_KEYS) {
                                                                        if (k2 !== key) {
                                                                            const ni = after.indexOf(k2 + ':');
                                                                            if (ni !== -1 && ni < nextIdx) nextIdx = ni;
                                                                        }
                                                                    }
                                                                    const sectionText = nextIdx === Infinity ? after.trim() : after.slice(0, nextIdx).trim();
                                                                    sections.push({ label: key, text: sectionText });
                                                                    remainingText = nextIdx === Infinity ? '' : after.slice(nextIdx);
                                                                }
                                                            }
                                                            if (remainingText.trim()) sections.push({ label: null, text: remainingText.trim() });
                                                        }

                                                        return (
                                                            <div key={idx} className="bg-gray-900 rounded-2xl overflow-hidden border border-gray-800 hover:border-gray-600 transition-colors">
                                                                <div className="flex items-center justify-between px-6 pt-5 pb-3 border-b border-gray-800">
                                                                    <div className="flex items-center gap-3">
                                                                        <span className="bg-indigo-600/30 text-indigo-400 text-[9px] font-black uppercase tracking-widest px-2.5 py-1 rounded-full border border-indigo-600/30">Image Prompt {idx + 1}</span>
                                                                        <span className="text-gray-600 text-[10px] font-bold uppercase tracking-widest">{promptLabels[idx] || ''}</span>
                                                                    </div>
                                                                    <div className="flex items-center gap-2">
                                                                        <span className="text-[9px] font-bold text-gray-600 uppercase tracking-widest">{wordCount}w</span>
                                                                        <button
                                                                            onClick={() => handleCopy('prompt_' + idx, finalPromptText)}
                                                                            className={`text-[10px] font-black py-1.5 px-3 rounded-lg border flex items-center gap-1.5 transition-all uppercase tracking-wider ${isCopied ? 'bg-green-500/20 text-green-400 border-green-500/30' : 'bg-white/10 hover:bg-white/20 text-white border-white/10'}`}
                                                                        >
                                                                            {isCopied ? (<><svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg> Copied!</>) : (<><svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg> Copy Prompt</>)}
                                                                        </button>
                                                                    </div>
                                                                </div>
                                                                <div className="px-6 py-5 space-y-4">
                                                                    {isStructured && sections.length > 1 ? (
                                                                        sections.map((sec, si) => sec.label ? (
                                                                            <div key={si} className={`rounded-lg border px-4 py-3 text-[12px] font-mono leading-relaxed ${SECTION_COLORS[sec.label] || 'border-gray-700 text-gray-400'}`}>
                                                                                <div className="text-[9px] font-black uppercase tracking-widest mb-1.5 opacity-70">{sec.label}</div>
                                                                                <div style={{ whiteSpace: 'pre-wrap' }}>{sec.text}</div>
                                                                            </div>
                                                                        ) : (
                                                                            <p key={si} className="text-gray-300 font-mono text-[13px] leading-relaxed" style={{ whiteSpace: 'pre-wrap' }}>{sec.text}</p>
                                                                        ))
                                                                    ) : (
                                                                        <p className="text-gray-300 font-mono text-[13px] leading-relaxed" style={{ whiteSpace: 'pre-wrap' }}>{finalPromptText}</p>
                                                                    )}
                                                                </div>
                                                                <div className="px-6 pb-4 flex gap-2 flex-wrap">
                                                                    {['Transparent BG', 'Vector', '300 DPI', 'Screen Print Safe'].map((tag, ti) => (
                                                                        <span key={ti} className="text-[9px] font-black uppercase tracking-widest bg-emerald-900/30 text-emerald-400 border border-emerald-800/40 px-2 py-0.5 rounded">{tag}</span>
                                                                    ))}
                                                                    <span className={`text-[9px] font-black uppercase tracking-widest px-2 py-0.5 rounded border ${currentPlatMeta.color}`}>{currentPlatMeta.label}</span>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        )}


                                        {strategy.amazonListing && (
                                            <div className="space-y-6 pt-6 border-t border-gray-100">
                                                <div className="flex items-center justify-between mb-2">
                                                    <h3 className="text-gray-900 font-black text-2xl flex items-center">
                                                        <span className={`text-white w-8 h-8 rounded-xl flex items-center justify-center text-xs mr-3 font-mono ${currentPlatKey === 'etsy' ? 'bg-pink-500' : currentPlatKey === 'redbubble' ? 'bg-red-500' : currentPlatKey === 'shopify' ? 'bg-green-600' : 'bg-orange-500'}`}>
                                                            {currentPlatKey === 'etsy' ? 'E' : currentPlatKey === 'redbubble' ? 'R' : currentPlatKey === 'shopify' ? 'S' : 'A'}
                                                        </span>
                                                        {currentPlatMeta.label} Listing
                                                    </h3>
                                                    <button
                                                        onClick={() => {
                                                            const text = `${strategy.amazonListing.title}\n\n${strategy.amazonListing.brandName}\n\n${strategy.amazonListing.bulletPoint1}\n${strategy.amazonListing.bulletPoint2}\n\n${strategy.amazonListing.description}\n\n${strategy.amazonListing.keywords.join(', ')}`;
                                                            handleCopy('listing', text);
                                                        }}
                                                        className="bg-yellow-400 hover:bg-yellow-500 text-yellow-900 text-xs font-black py-2 px-4 rounded-lg shadow-sm flex items-center justify-center min-w-[170px] transition-colors uppercase tracking-wider"
                                                    >
                                                        {copiedId === 'listing' ? (
                                                            <span className="flex items-center gap-2"><svg className="w-4 h-4 text-green-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg> COPIED ✓</span>
                                                        ) : (
                                                            <span className="flex items-center gap-2"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg> Copy Full Listing</span>
                                                        )}
                                                    </button>
                                                </div>

                                                <div className="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                                                    <div className="p-6 border-b border-gray-100 bg-gray-50/50">
                                                        <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Product Title</label>
                                                        <p className="text-lg font-bold text-gray-900 leading-snug">{strategy.amazonListing.title}</p>
                                                    </div>

                                                    <div className="grid grid-cols-1 md:grid-cols-2">
                                                        <div className="p-6 border-b md:border-b-0 md:border-r border-gray-100 space-y-4">
                                                            <div>
                                                                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Brand Name</label>
                                                                <p className="text-sm font-semibold text-blue-700 bg-blue-50 inline-block px-3 py-1 rounded-md">{strategy.amazonListing.brandName}</p>
                                                            </div>
                                                            <div>
                                                                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Bullet Point 1</label>
                                                                <p className="text-sm text-gray-700 leading-relaxed">{strategy.amazonListing.bulletPoint1}</p>
                                                            </div>
                                                            <div>
                                                                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Bullet Point 2</label>
                                                                <p className="text-sm text-gray-700 leading-relaxed">{strategy.amazonListing.bulletPoint2}</p>
                                                            </div>
                                                        </div>

                                                        <div className="p-6 space-y-4 bg-gray-50/30">
                                                            <div>
                                                                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Product Description</label>
                                                                <p className="text-sm text-gray-600 leading-relaxed italic">{strategy.amazonListing.description}</p>
                                                            </div>
                                                            <div>
                                                                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Backend Search Terms</label>
                                                                <div className="flex flex-wrap gap-1.5">
                                                                    {strategy.amazonListing.keywords && strategy.amazonListing.keywords.map((kw, i) => (
                                                                        <span key={i} className="text-[10px] font-bold bg-white text-gray-600 px-2 py-1 rounded border border-gray-200">
                                                                            {kw}
                                                                        </span>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {/* Slogans Section */}
                                        <div className="space-y-6 pt-6 border-t border-gray-100">
                                            <div className="flex items-center justify-between mb-2">
                                                <h3 className="text-gray-900 font-black text-2xl flex items-center">
                                                    <span className="bg-blue-600 text-white w-8 h-8 rounded-xl flex items-center justify-center text-xs mr-3 font-mono">S</span>
                                                    10 Catchy Shirt Slogans
                                                </h3>
                                                <button
                                                    onClick={() => handleCopy('slogans', strategy.shirtSlogans.join('\n'))}
                                                    className="bg-blue-50 hover:bg-blue-100 text-blue-700 text-xs font-bold py-2 px-3 rounded-md border border-blue-200 flex items-center justify-center min-w-[100px] transition-colors uppercase"
                                                >
                                                    {copiedId === 'slogans' ? (
                                                        <span className="flex items-center gap-1.5 text-green-600"><svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg> COPIED</span>
                                                    ) : (
                                                        <span className="flex items-center gap-1.5"><svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg> Copy All</span>
                                                    )}
                                                </button>
                                            </div>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                {strategy.shirtSlogans.map((slogan, idx) => (
                                                    <div key={idx} className="bg-white border border-gray-100 p-5 rounded-xl shadow-sm hover:shadow-md hover:border-blue-200 transition-all cursor-pointer group relative overflow-hidden flex items-center">
                                                        <div className="absolute left-0 top-0 h-full w-1.5 bg-blue-600 transform -translate-x-full group-hover:translate-x-0 transition-transform"></div>
                                                        <p className="text-gray-900 font-black text-sm italic tracking-tight leading-snug">"{slogan}"</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main >
                </div >
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
