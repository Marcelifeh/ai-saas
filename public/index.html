<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Shirt Slogan Generator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel (to compile JSX in the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-gray-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [prompt, setPrompt] = useState("");
            const [slogans, setSlogans] = useState([]);
            const [loading, setLoading] = useState(false);

            const handleGenerate = async () => {
                if (!prompt.trim()) return;

                setLoading(true);
                setSlogans([]);

                try {
                    const response = await fetch("/api/generate", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ prompt }),
                    });

                    const data = await response.json();

                    if (data.success) {
                        setSlogans(data.shirtSlogans);
                    } else {
                        console.error("Error:", data.error);
                        alert("Failed to generate slogans: " + data.error);
                    }
                } catch (error) {
                    console.error(error);
                    alert("Something went wrong. Check console.");
                }

                setLoading(false);
            };

            return (
                <div className="container mx-auto p-4 max-w-2xl mt-10">
                    <div className="bg-white p-6 rounded-lg shadow-md">
                        <h1 className="text-2xl font-bold mb-4 text-center">T-Shirt Slogan Generator</h1>

                        <input
                            type="text"
                            placeholder="Enter prompt... (e.g., coffee loving cats)"
                            value={prompt}
                            onChange={(e) => setPrompt(e.target.value)}
                            className="border border-gray-300 p-3 w-full mb-4 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                        />

                        <button
                            onClick={handleGenerate}
                            disabled={loading || !prompt.trim()}
                            className="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded w-full disabled:bg-blue-300 transition duration-150"
                        >
                            {loading ? "Generating..." : "Generate Slogans"}
                        </button>

                        <div className="mt-6">
                            {slogans.length > 0 && (
                                <ul className="space-y-3">
                                    {slogans.map((slogan, idx) => (
                                        <li key={idx} className="border border-gray-100 p-4 rounded bg-gray-50 shadow-sm text-gray-800 font-medium">
                                            {slogan}
                                        </li>
                                    ))}
                                </ul>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
