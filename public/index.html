<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI POD Strategy & Slogan Generator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel (to compile JSX in the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-gray-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [prompt, setPrompt] = useState("");
            const [strategy, setStrategy] = useState(null);
            const [loading, setLoading] = useState(false);

            const handleGenerate = async () => {
                if (!prompt.trim()) return;

                setLoading(true);
                setStrategy(null);

                try {
                    const response = await fetch("/api/generate", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ prompt }),
                    });

                    const data = await response.json();

                    if (data.success) {
                        setStrategy(data.data);
                    } else {
                        console.error("Error:", data.error);
                        alert("Failed to generate: " + data.error);
                    }
                } catch (error) {
                    console.error(error);
                    alert("Something went wrong. Check console.");
                }

                setLoading(false);
            };

            return (
                <div className="container mx-auto p-4 max-w-3xl mt-10 pb-20">
                    <div className="bg-white p-6 rounded-xl shadow-lg border border-gray-100">
                        <h1 className="text-3xl font-extrabold mb-2 text-center text-gray-900">POD Strategy Generator</h1>
                        <p className="text-gray-500 text-center mb-8">Enter a niche or topic to get a full merch strategy</p>

                        <div className="flex flex-col md:flex-row gap-2 mb-6">
                            <input
                                type="text"
                                placeholder="e.g., retro hiking, cat dads, nurse humor..."
                                value={prompt}
                                onChange={(e) => setPrompt(e.target.value)}
                                className="flex-1 border border-gray-200 p-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg shadow-sm"
                            />
                            <button
                                onClick={handleGenerate}
                                disabled={loading || !prompt.trim()}
                                className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-lg disabled:bg-blue-300 transition duration-150 shadow-md whitespace-nowrap"
                            >
                                {loading ? "Analyzing..." : "Generate Strategy"}
                            </button>
                        </div>

                        {strategy && (
                            <div className="mt-8 space-y-8 animate-in fade-in duration-500">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-blue-50 p-5 rounded-lg border border-blue-100">
                                        <h3 className="text-blue-800 font-bold uppercase text-xs tracking-widest mb-2">Target Niche</h3>
                                        <p className="text-xl font-semibold text-gray-800">{strategy.niche}</p>
                                    </div>
                                    <div className="bg-green-50 p-5 rounded-lg border border-green-100">
                                        <h3 className="text-green-800 font-bold uppercase text-xs tracking-widest mb-2">Competition Level</h3>
                                        <p className="text-xl font-semibold text-gray-800">{strategy.competitionLevel}</p>
                                    </div>
                                </div>

                                <div>
                                    <h3 className="text-gray-900 font-bold text-lg mb-2 flex items-center">
                                        <span className="bg-gray-900 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs mr-2">1</span>
                                        Why It Sells
                                    </h3>
                                    <p className="text-gray-700 bg-gray-50 p-4 rounded-lg border border-gray-100 leading-relaxed">
                                        {strategy.whyItSells}
                                    </p>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div>
                                        <h3 className="text-gray-900 font-bold text-lg mb-3">Target Audiences</h3>
                                        <div className="flex flex-wrap gap-2">
                                            {strategy.targetAudiences.map((aud, i) => (
                                                <span key={i} className="bg-white border border-gray-200 px-3 py-1 rounded-full text-sm text-gray-600 shadow-sm">
                                                    {aud}
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                    <div>
                                        <h3 className="text-gray-900 font-bold text-lg mb-3">Design Directions</h3>
                                        <ul className="list-disc list-inside space-y-1 text-gray-600 text-sm">
                                            {strategy.designDirections.map((dir, i) => (
                                                <li key={i}>{dir}</li>
                                            ))}
                                        </ul>
                                    </div>
                                </div>

                                <div>
                                    <h3 className="text-gray-900 font-bold text-lg mb-4 flex items-center">
                                        <span className="bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs mr-2">2</span>
                                        Catchy Shirt Slogans
                                    </h3>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                        {strategy.shirtSlogans.map((slogan, idx) => (
                                            <div key={idx} className="bg-white border border-gray-100 p-4 rounded-xl shadow-sm hover:shadow-md transition-shadow cursor-default group relative overflow-hidden">
                                                <div className="absolute left-0 top-0 h-full w-1 bg-blue-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                                <p className="text-gray-800 font-medium italic">"{slogan}"</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
