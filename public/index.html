<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI POD Strategy & Slogan Generator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel (to compile JSX in the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .animate-fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }

        .heat-tile {
            padding: 14px;
            border-radius: 10px;
            color: white;
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s ease;
        }

        .heat-tile:hover {
            transform: translateY(-4px);
        }

        .heat-score {
            font-size: 28px;
            font-weight: 900;
        }

        .heat-decision {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.9;
        }

        .queue-card {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: white;
            padding: 16px;
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .queue-card:hover {
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            border-color: #22c55e;
        }

        .run-card {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px;
            background: white;
            cursor: pointer;
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .run-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.07);
            border-color: #6366f1;
        }

        .run-bar-bg {
            background: #f3f4f6;
            border-radius: 999px;
            height: 6px;
            flex: 1;
        }

        .run-bar-fill {
            border-radius: 999px;
            height: 6px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            transition: width 0.5s ease;
        }

        .revenue-box {
            background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
            border: 1px solid #bbf7d0;
            border-radius: 12px;
            padding: 14px 16px;
        }

        .revenue-box.medium {
            background: linear-gradient(135deg, #fffbeb 0%, #fef9c3 100%);
            border-color: #fde68a;
        }

        .revenue-box.low {
            background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
            border-color: #e5e7eb;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ─── Revenue Projection Engine ─────────────────────────────────────
        const ROYALTY_PER_SALE = 5.50;  // Amazon POD royalty
        const BASE_MONTHLY_SALES = 30;  // baseline for an average niche

        function getConfidence(score) {
            if (score >= 75) return 'High';
            if (score >= 55) return 'Medium';
            return 'Low';
        }

        function estimateSales(product) {
            const demandFactor = (product.searchVolume || 50) / 100;
            const compPenalty = 1 - (product.competitionDensity || 50) / 100;
            const trendBoost = (product.trendMomentum || 50) / 100;
            const intentBoost = (product.buyerIntent || 50) / 100;

            const raw = BASE_MONTHLY_SALES *
                demandFactor *
                compPenalty *
                (1 + trendBoost) *
                (1 + intentBoost);

            return Math.max(1, Math.round(raw));
        }

        function projectRevenue(product) {
            const sales = estimateSales(product);
            return {
                monthlySales: sales,
                monthlyRevenue: parseFloat((sales * ROYALTY_PER_SALE).toFixed(2)),
                confidence: getConfidence(product.niche_score || 0)
            };
        }

        function portfolioRevenue(products) {
            return (products || []).reduce((sum, p) => {
                const proj = p.projection || projectRevenue(p);
                return sum + proj.monthlyRevenue;
            }, 0);
        }

        // ─── RevenueBox Component ────────────────────────────────────────
        function RevenueBox({ product }) {
            const proj = product.projection || projectRevenue(product);
            const confClass = proj.confidence === 'High' ? '' :
                proj.confidence === 'Medium' ? 'medium' : 'low';
            const confColor = proj.confidence === 'High' ? 'text-emerald-700' :
                proj.confidence === 'Medium' ? 'text-yellow-700' : 'text-gray-500';
            return (
                <div className={`revenue-box ${confClass} mt-4`}>
                    <div className="flex items-center justify-between mb-3">
                        <span className="text-[10px] font-black uppercase tracking-widest text-gray-500 flex items-center gap-1">
                            <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Revenue Projection
                        </span>
                        <span className={`text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded ${confColor} ${proj.confidence === 'High' ? 'bg-emerald-100' : proj.confidence === 'Medium' ? 'bg-yellow-100' : 'bg-gray-100'}`}>
                            {proj.confidence} Confidence
                        </span>
                    </div>
                    <div className="grid grid-cols-3 gap-2 text-center">
                        <div className="bg-white/70 rounded-lg p-2">
                            <div className="text-lg font-black text-gray-800">{proj.monthlySales}</div>
                            <div className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Est. Sales/mo</div>
                        </div>
                        <div className="bg-white/70 rounded-lg p-2">
                            <div className="text-lg font-black text-gray-800">${proj.monthlyRevenue.toFixed(2)}</div>
                            <div className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Profit/mo</div>
                        </div>
                        <div className="bg-white/70 rounded-lg p-2">
                            <div className="text-lg font-black text-gray-800">${(proj.monthlyRevenue * 12).toFixed(0)}</div>
                            <div className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Annual Est.</div>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── Client-side Compliance Helpers ─────────────────────────────────────
        const FRONTEND_TRADEMARK_FLAGS = [
            "disney", "marvel", "star wars", "star trek", "pokemon", "nintendo", "super mario",
            "zelda", "minecraft", "nike", "adidas", "supreme", "gucci", "louis vuitton",
            "prada", "versace", "chanel", "rolex", "yeezy", "coca cola", "pepsi", "starbucks",
            "red bull", "harry potter", "lord of the rings", "game of thrones", "breaking bad",
            "the simpsons", "spongebob", "mickey mouse", "spiderman", "batman", "superman",
            "iron man", "avengers", "frozen", "moana", "hello kitty", "barbie", "transformers",
            "taylor swift", "beyonce", "eminem", "drake", "kanye west", "the beatles"
        ];
        const FRONTEND_POLICY_BLOCK = [
            "logo parody", "brand parody", "celebrity name", "movie quote", "song lyrics",
            "copyrighted character", "guaranteed cure", "medical claim", "hate symbol",
            "hate speech", "racial slur", "explicit sexual"
        ];

        function checkFrontendCompliance(text) {
            const lower = (text || "").toLowerCase();
            const tm = FRONTEND_TRADEMARK_FLAGS.filter(t => lower.includes(t));
            const pol = FRONTEND_POLICY_BLOCK.filter(t => lower.includes(t));
            return { flagged: tm.length > 0 || pol.length > 0, trademarks: tm, policies: pol };
        }

        // ─── ComplianceBadge Component ───────────────────────────────────────────
        function ComplianceBadge({ compliance }) {
            if (!compliance) return null;

            if (compliance.wasRewritten) {
                return (
                    <div className="flex flex-col gap-2 mt-3 p-3 bg-purple-50/50 border border-purple-200 rounded-lg">
                        <div className="flex items-center gap-2">
                            <svg className="w-4 h-4 text-purple-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd"></path></svg>
                            <span className="text-[10px] font-black text-purple-700 uppercase tracking-widest">Rewritten — Safe</span>
                        </div>
                        <div className="text-[10px] font-medium text-purple-600">
                            Original concept generated to ensure marketplace compliance.
                        </div>
                    </div>
                );
            }

            if (compliance.safe) {
                return (
                    <div className="flex items-center gap-2 mt-3 px-3 py-2 bg-emerald-50 border border-emerald-200 rounded-lg">
                        <svg className="w-3.5 h-3.5 text-emerald-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd"></path></svg>
                        <span className="text-[10px] font-black text-emerald-700 uppercase tracking-widest">Compliance Clear — Safe for Publishing</span>
                    </div>
                );
            }
            const isHigh = compliance.riskLevel === 'HIGH';
            return (
                <div className={`mt-3 px-3 py-3 rounded-lg border ${isHigh ? 'bg-red-50 border-red-200' : 'bg-yellow-50 border-yellow-200'}`}>
                    <div className="flex items-center gap-2 mb-2">
                        <svg className={`w-3.5 h-3.5 flex-shrink-0 ${isHigh ? 'text-red-500' : 'text-yellow-500'}`} fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clipRule="evenodd"></path></svg>
                        <span className={`text-[10px] font-black uppercase tracking-widest ${isHigh ? 'text-red-700' : 'text-yellow-700'}`}>
                            {isHigh ? '🚫 High Risk' : '⚠️ Medium Risk'} — Review Before Publishing
                        </span>
                    </div>
                    {compliance.trademarkMatches.length > 0 && (
                        <p className={`text-[10px] font-bold ${isHigh ? 'text-red-600' : 'text-yellow-600'}`}>
                            <span className="uppercase tracking-wider">Trademark:</span> {compliance.trademarkMatches.join(", ")}
                        </p>
                    )}
                    {compliance.policyViolations.length > 0 && (
                        <p className={`text-[10px] font-bold mt-0.5 ${isHigh ? 'text-red-600' : 'text-yellow-600'}`}>
                            <span className="uppercase tracking-wider">Policy:</span> {compliance.policyViolations.join(", ")}
                        </p>
                    )}
                </div>
            );
        }

        // ─── Publish Queue Logic ─────────────────────────────────────────────
        function shouldPublish(product) {
            return (
                product.niche_score >= 70 &&
                product.searchVolume >= 60 &&
                product.competitionDensity <= 50 &&
                product.trendMomentum >= 50 &&
                product.safe !== false &&
                product.compliance?.safe !== false   // never publish flagged products
            );
        }

        function buildPublishQueue(products) {
            return products
                .filter(shouldPublish)
                .map(p => ({
                    ...p,
                    publish_confidence: Math.round(
                        (p.niche_score + p.trendMomentum + p.searchVolume) / 3
                    )
                }))
                .sort((a, b) => b.publish_confidence - a.publish_confidence);
        }

        function getRiskBadge(p) {
            if (p.competitionDensity >= 70) return { label: 'Saturated', color: 'bg-red-100 text-red-700' };
            if (p.trendMomentum >= 70) return { label: 'Emerging', color: 'bg-blue-100 text-blue-700' };
            return { label: 'Evergreen', color: 'bg-green-100 text-green-700' };
        }

        function exportQueueCSV(queue) {
            if (!queue.length) return;
            const csvSafe = (v) => `"${String(v || '').replace(/"/g, '""')}"`;
            const headers = ['niche', 'title', 'slogan', 'niche_score', 'publish_confidence',
                'searchVolume', 'competitionDensity', 'trendMomentum', 'buyerIntent',
                'blacklist_flag', 'tmhunt_flag', 'safe'];
            const rows = queue.map(p =>
                [
                    csvSafe(p.niche),
                    csvSafe(p.title || p.amazonListing?.title),
                    csvSafe(p.slogan || (p.shirtSlogans && p.shirtSlogans[0])),
                    p.niche_score,
                    p.publish_confidence,
                    p.searchVolume,
                    p.competitionDensity,
                    p.trendMomentum,
                    p.buyerIntent,
                    csvSafe(p.compliance?.policyViolations?.join(' | ') || ''),
                    csvSafe(p.compliance?.trademarkMatches?.join(' | ') || ''),
                    p.compliance?.safe ? (p.compliance?.wasRewritten ? 'REWRITTEN_SAFE' : 'TRUE') : 'FALSE'
                ].join(',')
            );
            const blob = new Blob([[headers.join(','), ...rows].join('\n')], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'publish_queue.csv'; a.click();
            URL.revokeObjectURL(url);
        }

        // ─── SmartPublishQueue Component ─────────────────────────────────────
        function SmartPublishQueue({ products }) {
            if (!products || products.length === 0) return null;
            const queue = buildPublishQueue(products);
            if (queue.length === 0) return (
                <div className="mb-8 p-5 rounded-2xl border border-dashed border-gray-200 bg-gray-50 text-center text-sm text-gray-400 font-semibold animate-fade-in">
                    No products met the auto-publish threshold this run. Lower the thresholds or re-run to generate higher-scoring niches.
                </div>
            );
            return (
                <section className="mb-10 animate-fade-in">
                    <div className="flex items-center justify-between mb-4">
                        <div>
                            <h3 className="text-xl font-black text-gray-900 flex items-center gap-2">
                                <span className="bg-emerald-100 text-emerald-600 w-8 h-8 flex items-center justify-center rounded-lg shadow-inner">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                                </span>
                                Smart Publish Queue
                            </h3>
                            <p className="text-xs font-bold uppercase tracking-wider text-gray-400 mt-1">{queue.length} Auto-Selected Winner{queue.length !== 1 ? 's' : ''}</p>
                        </div>
                        <button
                            onClick={() => exportQueueCSV(queue)}
                            className="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-black px-4 py-2.5 rounded-xl shadow-md shadow-emerald-900/20 transition-all"
                        >
                            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            Export Queue CSV
                        </button>
                    </div>
                    <div className="grid grid-cols-1 gap-3">
                        {queue.map((p, idx) => {
                            const badge = getRiskBadge(p);
                            const title = p.title || p.amazonListing?.title || '—';
                            const slogan = p.slogan || (p.shirtSlogans && p.shirtSlogans[0]) || '—';
                            return (
                                <div key={idx} className="queue-card">
                                    <div className="flex items-start justify-between gap-4">
                                        <div className="flex-1">
                                            <div className="flex items-center gap-2 mb-1">
                                                <span className="text-[10px] font-black bg-emerald-500 text-white px-2 py-0.5 rounded uppercase tracking-widest">PUBLISH</span>
                                                <span className={`text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-widest ${badge.color}`}>{badge.label}</span>
                                                <span className="text-[10px] font-bold text-gray-400 uppercase">#{idx + 1}</span>
                                            </div>
                                            <div className="font-black text-gray-800 text-sm mb-0.5">{p.niche}</div>
                                            <div className="text-xs text-gray-500 font-medium truncate">{title}</div>
                                            {slogan !== '—' && <div className="text-xs text-emerald-700 font-semibold mt-1 italic">"{slogan}"</div>}
                                        </div>
                                        <div className="text-right flex-shrink-0">
                                            <div className="text-3xl font-black text-gray-800">{p.niche_score}</div>
                                            <div className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Score</div>
                                            <div className="mt-1 text-sm font-black" style={{ color: '#22c55e' }}>{p.publish_confidence}%</div>
                                            <div className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Confidence</div>
                                        </div>
                                    </div>
                                    <div className="flex gap-4 mt-3 pt-3 border-t border-gray-100 text-xs">
                                        <div><span className="text-gray-400 font-bold uppercase block text-[9px]">Demand</span><span className="font-black text-gray-700">{p.searchVolume}</span></div>
                                        <div><span className="text-gray-400 font-bold uppercase block text-[9px]">Competition</span><span className="font-black text-gray-700">{p.competitionDensity}</span></div>
                                        <div><span className="text-gray-400 font-bold uppercase block text-[9px]">Trend</span><span className="font-black text-gray-700">{p.trendMomentum}</span></div>
                                        <div><span className="text-gray-400 font-bold uppercase block text-[9px]">Buyer Intent</span><span className="font-black text-gray-700">{p.buyerIntent}</span></div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </section>
            );
        }

        function getHeatColor(score) {
            if (score >= 75) return "#22c55e";   // green
            if (score >= 55) return "#f59e0b";   // amber
            return "#ef4444";                    // red
        }

        function Heatmap({ products }) {
            if (!products || products.length === 0) return null;
            return (
                <section className="mb-10 animate-fade-in pb-8 border-b border-gray-100">
                    <h3 className="text-xl font-black text-gray-900 mb-2 flex items-center gap-2">
                        <span className="bg-blue-100 text-blue-600 w-8 h-8 flex items-center justify-center rounded-lg shadow-inner">
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                        </span>
                        Opportunity Heatmap
                    </h3>
                    <p className="text-xs font-bold uppercase tracking-wider text-gray-400 mb-4">Portfolio Profitability Overview</p>
                    <div className="heatmap-grid">
                        {products.map((p, idx) => (
                            <div key={idx} className="heat-tile" style={{ background: getHeatColor(p.niche_score) }}>
                                <div className="font-bold text-sm mb-2">{p.niche}</div>
                                <div className="heat-score">{p.niche_score}</div>
                                <div className="heat-decision mb-3">{p.decision}</div>
                                <small className="text-[10px] opacity-80 mt-auto pt-2 border-t border-white/20 -mx-1 px-1">
                                    Demand {p.searchVolume || p.research_demand} • Comp {p.competitionDensity || p.research_competition}
                                </small>
                            </div>
                        ))}
                    </div>
                </section>
            );
        }

        // ─── Run History Helpers ───────────────────────────────────────────
        function averageArr(arr) {
            if (!arr.length) return 0;
            return Math.round(arr.reduce((a, b) => a + b, 0) / arr.length);
        }

        function createRunRecord(products, type) {
            const scores = products.map(p => p.niche_score).filter(Boolean);
            return {
                id: Date.now(),
                date: new Date().toISOString(),
                type: type || 'bulk',
                totalProducts: products.length,
                avgScore: averageArr(scores),
                topScore: scores.length ? Math.max(...scores) : 0,
                publishableCount: products.filter(shouldPublish).length,
                products
            };
        }

        function saveRun(record) {
            const history = JSON.parse(localStorage.getItem('saas_runs') || '[]');
            history.unshift(record);
            localStorage.setItem('saas_runs', JSON.stringify(history.slice(0, 50)));
        }

        function loadRunHistory() {
            return JSON.parse(localStorage.getItem('saas_runs') || '[]');
        }

        // ─── RunHistoryView Component ────────────────────────────────────
        function RunHistoryView({ history, onClearHistory }) {
            const [expandedId, setExpandedId] = useState(null);

            if (!history.length) return (
                <div className="mt-12 flex flex-col items-center justify-center text-center p-12 border-2 border-dashed border-gray-200 rounded-3xl bg-gray-50/50 animate-fade-in">
                    <div className="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center mb-4 border border-indigo-100">
                        <svg className="w-7 h-7 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <h3 className="text-lg font-black text-gray-800 mb-1">No runs yet</h3>
                    <p className="text-sm text-gray-400 font-medium">Run the Bulk Factory or Full Autopilot to start tracking performance</p>
                </div>
            );

            // Analytics across all runs
            const totalProducts = history.reduce((s, r) => s + r.totalProducts, 0);
            const totalPublishable = history.reduce((s, r) => s + r.publishableCount, 0);
            const avgRunScore = averageArr(history.map(r => r.avgScore));
            const publishRate = totalProducts ? Math.round((totalPublishable / totalProducts) * 100) : 0;
            const bestRun = history.reduce((best, r) => r.avgScore > best.avgScore ? r : best, history[0]);
            const totalPortfolioRevenue = history.reduce((sum, r) => sum + portfolioRevenue(r.products || []), 0);

            return (
                <div className="mt-6 animate-fade-in space-y-8">

                    {/* Analytics Summary */}
                    <div>
                        <div className="flex items-center justify-between mb-4">
                            <div>
                                <h2 className="text-2xl font-black text-gray-900 flex items-center gap-3">
                                    <span className="bg-indigo-100 text-indigo-600 w-10 h-10 flex items-center justify-center rounded-xl shadow-inner">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                                    </span>
                                    Performance Analytics
                                </h2>
                                <p className="text-xs font-bold uppercase tracking-wider text-gray-400 mt-1">Across {history.length} run{history.length !== 1 ? 's' : ''}</p>
                            </div>
                            <button
                                onClick={onClearHistory}
                                className="text-xs font-bold text-red-400 hover:text-red-600 border border-red-200 hover:border-red-400 px-3 py-1.5 rounded-lg transition-all"

                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm text-center">
                                <div className="text-2xl font-black text-indigo-600">{history.length}</div>
                                <div className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Total Runs</div>

                            <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm text-center">
                                <div className="text-2xl font-black text-gray-800">{totalProducts}</div>
                                <div className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Products Generated</div>
                            </div>
                            <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm text-center">
                                <div className="text-2xl font-black text-gray-800">{avgRunScore}</div>
                                <div className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Avg Niche Score</div>
                            </div>
                            <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm text-center">
                                <div className="text-2xl font-black text-emerald-600">{publishRate}%</div>
                                <div className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Publish Rate</div>
                            </div>
                        </div>

                        {/* Publish rate bar */}
                        <div className="mt-4 bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                            <div className="flex justify-between items-center text-xs font-bold text-gray-500 mb-2">
                                <span>Publish Eligibility Rate</span>
                                <span className="text-emerald-600">{publishRate}%</span>
                            </div>
                            <div className="run-bar-bg"><div className="run-bar-fill" style={{ width: `${publishRate}%` }}></div></div>
                            {bestRun && (
                                <div className="mt-3 text-xs text-gray-400 font-medium">✓ Best run on {new Date(bestRun.date).toLocaleDateString()} — avg score <span className="font-black text-gray-700">{bestRun.avgScore}</span></div>
                            )}
                        </div>

                        {/* Portfolio Revenue Forecast */}
                        <div className="mt-4 bg-gradient-to-br from-emerald-50 to-green-50 border border-emerald-200 rounded-xl p-4 flex items-center justify-between">
                            <div>
                                <div className="text-[10px] font-black uppercase tracking-widest text-emerald-600 flex items-center gap-1 mb-1">
                                    <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    Revenue Forecast
                                </div>
                                <div className="text-xs text-emerald-700 font-medium">Estimated if all generated products were published</div>
                            </div>
                            <div className="text-right">
                                <div className="text-2xl font-black text-emerald-700">${totalPortfolioRevenue.toFixed(2)}</div>
                                <div className="text-[9px] font-bold text-emerald-500 uppercase tracking-widest">/month portfolio est.</div>
                            </div>
                        </div>
                    </div>

                    {/* Run list */}
                    <div>
                        <h3 className="text-lg font-black text-gray-800 mb-3 flex items-center gap-2">
                            <svg className="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Run History
                        </h3>
                        <div className="space-y-3">
                            {history.map((run) => {
                                const isExpanded = expandedId === run.id;
                                const date = new Date(run.date);
                                const typeLabel = run.type === 'autopilot' ? 'Full Autopilot' : 'Bulk Factory';
                                const typeColor = run.type === 'autopilot' ? 'bg-emerald-100 text-emerald-700' : 'bg-yellow-100 text-yellow-700';
                                return (
                                    <div key={run.id} className="run-card" onClick={() => setExpandedId(isExpanded ? null : run.id)}>
                                        <div className="flex items-start justify-between gap-4">
                                            <div className="flex-1">
                                                <div className="flex items-center gap-2 mb-1">
                                                    <span className={`text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-widest ${typeColor}`}>{typeLabel}</span>
                                                    <span className="text-[10px] text-gray-400 font-medium">{date.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })} at {date.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' })}</span>
                                                </div>
                                                <div className="flex gap-4 text-sm mt-2">
                                                    <div><span className="text-gray-400 text-[10px] font-bold uppercase block">Products</span><span className="font-black text-gray-800">{run.totalProducts}</span></div>
                                                    <div><span className="text-gray-400 text-[10px] font-bold uppercase block">Avg Score</span><span className="font-black text-gray-800">{run.avgScore}</span></div>
                                                    <div><span className="text-gray-400 text-[10px] font-bold uppercase block">Top Score</span><span className="font-black text-gray-800">{run.topScore}</span></div>
                                                    <div><span className="text-gray-400 text-[10px] font-bold uppercase block">Publishable</span><span className="font-black text-emerald-600">{run.publishableCount}</span></div>
                                                </div>
                                            </div>
                                            <div className="text-gray-400 mt-1 flex-shrink-0">
                                                <svg className={`w-4 h-4 transition-transform ${isExpanded ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
                                            </div>
                                        </div>

                                        {isExpanded && (
                                            <div className="mt-4 pt-4 border-t border-gray-100 grid grid-cols-1 gap-2">
                                                {(run.products || []).map((p, pi) => (
                                                    <div key={pi} className="flex items-center justify-between p-3 bg-gray-50 rounded-xl">
                                                        <div>
                                                            <div className="font-bold text-sm text-gray-800">{p.niche}</div>
                                                            <div className="text-xs text-gray-400 font-medium">{p.slogan || (p.shirtSlogans && p.shirtSlogans[0]) || ''}</div>
                                                        </div>
                                                        <div className="flex items-center gap-2 flex-shrink-0">
                                                            <div className="text-xl font-black" style={{ color: getHeatColor(p.niche_score) }}>{p.niche_score}</div>
                                                            <span className={`text-[9px] font-black px-1.5 py-0.5 rounded uppercase tracking-widest ${p.decision === 'PUBLISH' ? 'bg-green-500 text-white' :
                                                                p.decision === 'TEST' ? 'bg-yellow-400 text-yellow-900' :
                                                                    'bg-red-500 text-white'
                                                                }`}>{p.decision}</span>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [prompt, setPrompt] = useState("");
            const [platform, setPlatform] = useState("");
            const [audience, setAudience] = useState("");
            const [style, setStyle] = useState("");
            const [strategy, setStrategy] = useState(() => {
                const saved = localStorage.getItem('ai_saas_strategy');
                return saved ? JSON.parse(saved) : null;
            });
            const [loading, setLoading] = useState(false);
            const [loadingText, setLoadingText] = useState("GENERATE");
            const [showOptions, setShowOptions] = useState(false);
            const [opportunities, setOpportunities] = useState(() => {
                const saved = localStorage.getItem('ai_saas_opportunities');
                return saved ? JSON.parse(saved) : null;
            });
            const [discovering, setDiscovering] = useState(false);
            const [discoveringText, setDiscoveringText] = useState("Auto Discover");
            const [bulkProducts, setBulkProducts] = useState(() => {
                const saved = localStorage.getItem('ai_saas_bulkProducts');
                return saved ? JSON.parse(saved) : null;
            });
            const [bulkLoading, setBulkLoading] = useState(false);
            const [bulkLoadingText, setBulkLoadingText] = useState("Bulk Generate Factory");
            const [autopilotData, setAutopilotData] = useState(() => {
                const saved = localStorage.getItem('ai_saas_autopilot');
                return saved ? JSON.parse(saved) : null;
            });
            const [autopilotLoading, setAutopilotLoading] = useState(false);
            const [autopilotLoadingText, setAutopilotLoadingText] = useState("Run Autopilot Production");
            const [activeView, setActiveView] = useState("dashboard"); // 'dashboard', 'discovery', 'bulk', 'autopilot', 'history'
            const [selectedDesignStyle, setSelectedDesignStyle] = useState("Vintage Distressed");
            const [runHistory, setRunHistory] = useState(() => loadRunHistory());
            const [pipelineStatus, setPipelineStatus] = useState(null);   // null | { step, label, progress }
            const [pipelineRunning, setPipelineRunning] = useState(false);

            const PRESET_STYLES = ["Vintage Distressed", "Hand-Drawn", "Bold Graphic", "Retro Vintage", "Minimalist Vector"];

            const FALLBACK_TRENDS = ["Dog moms", "Nurses", "Gym humor", "Christian faith", "Fishing dads", "Tech workers"];
            const [trendingTopics, setTrendingTopics] = useState(FALLBACK_TRENDS);
            const [trendsLoading, setTrendsLoading] = useState(false);

            // Fetch fresh trends from /api/discover once every 24 hours
            useEffect(() => {
                const CACHE_KEY = 'ai_saas_trends_cache';
                const TTL_MS = 24 * 60 * 60 * 1000; // 24 hours
                try {
                    const cached = localStorage.getItem(CACHE_KEY);
                    if (cached) {
                        const { ts, topics } = JSON.parse(cached);
                        if (Date.now() - ts < TTL_MS && Array.isArray(topics) && topics.length) {
                            setTrendingTopics(topics);
                            return; // still fresh, skip fetch
                        }
                    }
                } catch (e) { }

                setTrendsLoading(true);
                fetch('/api/discover', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' })
                    .then(r => r.json())
                    .then(data => {
                        if (data.success && Array.isArray(data.opportunities) && data.opportunities.length) {
                            // Use the niche name, trimmed and title-cased
                            const topics = data.opportunities
                                .slice(0, 6)
                                .map(o => o.niche || o.targetAudience || '')
                                .filter(Boolean);
                            if (topics.length) {
                                setTrendingTopics(topics);
                                try {
                                    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), topics }));
                                } catch (e) { }
                            }
                        }
                    })
                    .catch(() => { /* silent — fallback list stays */ })
                    .finally(() => setTrendsLoading(false));
            }, []);

            // UX Foundation States
            const [error, setError] = useState(null); // { message, type }
            const [generationTime, setGenerationTime] = useState(null);
            const [startTime, setStartTime] = useState(null);
            const [copiedId, setCopiedId] = useState(null);

            const handleCopy = (id, text) => {
                navigator.clipboard.writeText(text);
                setCopiedId(id);
                setTimeout(() => setCopiedId(null), 2000);
            };

            // Persist to local storage
            useEffect(() => {
                if (strategy) localStorage.setItem('ai_saas_strategy', JSON.stringify(strategy));
                else localStorage.removeItem('ai_saas_strategy');
            }, [strategy]);

            useEffect(() => {
                if (opportunities) localStorage.setItem('ai_saas_opportunities', JSON.stringify(opportunities));
                else localStorage.removeItem('ai_saas_opportunities');
            }, [opportunities]);

            useEffect(() => {
                if (bulkProducts) localStorage.setItem('ai_saas_bulkProducts', JSON.stringify(bulkProducts));
                else localStorage.removeItem('ai_saas_bulkProducts');
            }, [bulkProducts]);

            useEffect(() => {
                if (autopilotData) localStorage.setItem('ai_saas_autopilot', JSON.stringify(autopilotData));
                else localStorage.removeItem('ai_saas_autopilot');
            }, [autopilotData]);

            useEffect(() => {
                let interval;
                if (loading) {
                    const phrases = ["Step 1: Market analysis...", "Step 2: Evaluating demand...", "Step 3: Concept generation...", "Step 4: Writing listing...", "Step 5: Scoring..."];
                    let idx = 0;
                    setLoadingText(phrases[0]);
                    interval = setInterval(() => {
                        idx = (idx + 1) % phrases.length;
                        setLoadingText(phrases[idx]);
                    }, 2500);
                } else {
                    setLoadingText("GENERATE");
                }
                return () => clearInterval(interval);
            }, [loading]);

            useEffect(() => {
                let interval;
                if (discovering) {
                    const phrases = ["Step 1: Scanning markets...", "Step 2: Finding goldmines...", "Step 3: Analyzing search volumes...", "Step 4: Ranking opportunities..."];
                    let idx = 0;
                    setDiscoveringText(phrases[0]);
                    interval = setInterval(() => {
                        idx = (idx + 1) % phrases.length;
                        setDiscoveringText(phrases[idx]);
                    }, 2500);
                } else {
                    setDiscoveringText("Auto Discover");
                }
                return () => clearInterval(interval);
            }, [discovering]);

            useEffect(() => {
                let interval;
                if (bulkLoading) {
                    const phrases = ["Step 1: Initializing factory...", "Step 2: Scanning niches...", "Step 3: Drafting designs...", "Step 4: Writing Amazon listings...", "Step 5: Scoring products...", "Step 6: Finalizing batch..."];
                    let idx = 0;
                    setBulkLoadingText(phrases[0]);
                    interval = setInterval(() => {
                        idx = (idx + 1) % phrases.length;
                        setBulkLoadingText(phrases[idx]);
                    }, 3000);
                } else {
                    setBulkLoadingText("Bulk Generate Factory");
                }
                return () => clearInterval(interval);
            }, [bulkLoading]);

            useEffect(() => {
                let interval;
                if (autopilotLoading) {
                    const phrases = ["Step 1: Finding opportunities...", "Step 2: Manufacturing products...", "Step 3: Building listings...", "Step 4: Evaluating profitability...", "Step 5: Ranking inventory..."];
                    let idx = 0;
                    setAutopilotLoadingText(phrases[0]);
                    interval = setInterval(() => {
                        idx = (idx + 1) % phrases.length;
                        setAutopilotLoadingText(phrases[idx]);
                    }, 3500);
                } else {
                    setAutopilotLoadingText("Run Autopilot Production");
                }
                return () => clearInterval(interval);
            }, [autopilotLoading]);

            const handleGenerate = async () => {
                if (!prompt.trim()) return;

                setLoading(true);
                setStrategy(null);
                setOpportunities(null);
                setBulkProducts(null);
                setError(null);

                // Pre-generation compliance warning (advisory — AI will still run with safety rules)
                const preCheck = checkFrontendCompliance(prompt + ' ' + audience);
                if (preCheck.flagged) {
                    const issueList = [...preCheck.trademarks, ...preCheck.policies].join(', ');
                    setError({
                        type: 'validation',
                        message: `⚠ Potential IP Risk Detected — your prompt references restricted content: "${issueList}". The AI will apply safety rules, but please review the result carefully before publishing.`
                    });
                }

                const start = Date.now();
                setStartTime(start);


                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 25000); // 25s timeout

                try {
                    const response = await fetch("/api/generate", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ prompt, platform, audience, style }),
                        signal: controller.signal
                    });

                    clearTimeout(timeoutId);
                    const data = await response.json();

                    if (data.success) {
                        setStrategy(data.data);
                        setGenerationTime(((Date.now() - start) / 1000).toFixed(1));
                    } else {
                        console.error("Error:", data.error);
                        setError({ type: 'validation', message: data.error });
                    }
                } catch (error) {
                    console.error(error);
                    if (error.name === 'AbortError') {
                        setError({ type: 'recoverable', message: 'Generation timed out. The AI took too long to respond. Please try again.' });
                    } else {
                        setError({ type: 'system', message: 'A system error occurred connecting to the generation server.' });
                    }
                }

                setLoading(false);
            };

            const handleDiscover = async () => {
                setDiscovering(true);
                setStrategy(null);
                setOpportunities(null);
                setBulkProducts(null);
                setError(null);
                const start = Date.now();
                setStartTime(start);

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 25000);

                try {
                    const response = await fetch("/api/discover", {
                        method: "POST",
                        signal: controller.signal
                    });

                    clearTimeout(timeoutId);
                    const data = await response.json();

                    if (data.success) {
                        setOpportunities(data.opportunities);
                        setGenerationTime(((Date.now() - start) / 1000).toFixed(1));
                    } else {
                        console.error("Error:", data.error);
                        setError({ type: 'validation', message: data.error });
                    }
                } catch (error) {
                    console.error(error);
                    if (error.name === 'AbortError') {
                        setError({ type: 'recoverable', message: 'Discovery timed out. Please try again.' });
                    } else {
                        setError({ type: 'system', message: 'A system error occurred connecting to the discovery server.' });
                    }
                }

                setDiscovering(false);
            };

            const handleBulkGenerate = async () => {
                setBulkLoading(true);
                setStrategy(null);
                setOpportunities(null);
                setBulkProducts(null);
                setError(null);
                const start = Date.now();
                setStartTime(start);

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 45000); // 45s for bulk

                try {
                    const response = await fetch("/api/bulk-generate", {
                        method: "POST",
                        signal: controller.signal
                    });

                    clearTimeout(timeoutId);
                    const data = await response.json();

                    if (data.success) {
                        setBulkProducts(data.products);
                        setGenerationTime(((Date.now() - start) / 1000).toFixed(1));
                        const rec = createRunRecord(data.products, 'bulk');
                        saveRun(rec);
                        setRunHistory(loadRunHistory());
                    } else {
                        console.error("Error:", data.error);
                        setError({ type: 'validation', message: data.error });
                    }
                } catch (error) {
                    console.error(error);
                    if (error.name === 'AbortError') {
                        setError({ type: 'recoverable', message: 'Bulk generation timed out. Building multiple products takes time, please try again.' });
                    } else {
                        setError({ type: 'system', message: 'A system error occurred connecting to the factory server.' });
                    }
                }

                setBulkLoading(false);
            };

            const handleAutopilot = async () => {
                setAutopilotLoading(true);
                setStrategy(null);
                setOpportunities(null);
                setBulkProducts(null);
                setAutopilotData(null);
                setError(null);
                const start = Date.now();
                setStartTime(start);

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 60000); // 60s for autopilot

                try {
                    const response = await fetch("/api/autopilot", {
                        method: "POST",
                        signal: controller.signal
                    });

                    clearTimeout(timeoutId);
                    const data = await response.json();

                    if (data.runSummary && data.products) {
                        setAutopilotData(data);
                        setGenerationTime(((Date.now() - start) / 1000).toFixed(1));
                        const rec = createRunRecord(data.products, 'autopilot');
                        saveRun(rec);
                        setRunHistory(loadRunHistory());
                    } else {
                        console.error("Error:", data.error);
                        setError({ type: 'validation', message: data.error || "Autopilot failed to return valid data." });
                    }
                } catch (error) {
                    console.error(error);
                    if (error.name === 'AbortError') {
                        setError({ type: 'recoverable', message: 'Autopilot timed out. Manufacturing a full pipeline takes time, please try again.' });
                    } else {
                        setError({ type: 'system', message: 'A system error occurred connecting to the autopilot server.' });
                    }
                }

                setAutopilotLoading(false);
            };

            const PIPELINE_STEPS = [
                { step: 1, label: 'Discovering profitable niches…', key: 'discover' },
                { step: 2, label: 'Generating product listings…', key: 'generate' },
                { step: 3, label: 'Scoring opportunity & demand…', key: 'score' },
                { step: 4, label: 'Forecasting revenue potential…', key: 'forecast' },
                { step: 5, label: 'Selecting publish candidates…', key: 'select' },
            ];

            const handleOneClickAutopilot = async () => {
                setPipelineRunning(true);
                setPipelineStatus({ step: 1, label: PIPELINE_STEPS[0].label, progress: 10 });
                setError(null);
                setAutopilotData(null);
                const start = Date.now();

                const stepDelay = (ms) => new Promise(res => setTimeout(res, ms));

                try {
                    // Step 1: visible start
                    await stepDelay(400);
                    setPipelineStatus({ step: 2, label: PIPELINE_STEPS[1].label, progress: 30 });

                    // Step 2-4: fire the unified server pipeline
                    await stepDelay(600);
                    setPipelineStatus({ step: 3, label: PIPELINE_STEPS[2].label, progress: 55 });

                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 90000);
                    const response = await fetch('/api/autopilot', { method: 'POST', signal: controller.signal });
                    clearTimeout(timeoutId);
                    const data = await response.json();

                    setPipelineStatus({ step: 4, label: PIPELINE_STEPS[3].label, progress: 75 });
                    await stepDelay(400);
                    setPipelineStatus({ step: 5, label: PIPELINE_STEPS[4].label, progress: 90 });
                    await stepDelay(400);

                    if (data.runSummary && data.products) {
                        // Attach revenue projections to every product
                        const enriched = { ...data, products: data.products.map(p => ({ ...p, projection: projectRevenue(p) })) };
                        setAutopilotData(enriched);
                        setGenerationTime(((Date.now() - start) / 1000).toFixed(1));
                        const rec = createRunRecord(enriched.products, 'autopilot');
                        saveRun(rec);
                        setRunHistory(loadRunHistory());
                        setPipelineStatus({ step: 5, label: '✓ Pipeline complete!', progress: 100 });
                        await stepDelay(900);
                        setActiveView('autopilot');
                    } else {
                        throw { message: data.error || 'Pipeline returned invalid data.' };
                    }
                } catch (err) {
                    if (err.name === 'AbortError') {
                        setError({ type: 'recoverable', message: 'One-click pipeline timed out. Please try again.' });
                    } else {
                        setError({ type: 'recoverable', message: err.message || 'Pipeline failed. Please try again.' });
                    }
                }

                setPipelineRunning(false);
                setPipelineStatus(null);
            };

            // Platform badge meta — computed before return so JSX can reference it
            const PLAT_META = {
                amazon: { label: 'Amazon Merch', color: 'bg-orange-500/20 text-orange-400 border-orange-500/30' },
                etsy: { label: 'Etsy POD', color: 'bg-pink-500/20 text-pink-400 border-pink-500/30' },
                redbubble: { label: 'Redbubble', color: 'bg-red-500/20 text-red-400 border-red-500/30' },
                shopify: { label: 'Shopify / Printify', color: 'bg-green-500/20 text-green-400 border-green-500/30' },
            };
            const currentPlatKey = (strategy && strategy.detectedPlatform) || 'amazon';
            const currentPlatMeta = PLAT_META[currentPlatKey] || PLAT_META.amazon;

            return (
